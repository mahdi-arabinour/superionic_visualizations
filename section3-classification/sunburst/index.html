<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sunburst Chart - Publication Ready</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root{ --bg:#ffffff; --panel:#f8fafc; --grid:#e5e7eb; --ink:#0f172a; --muted:#64748b;
         --chip:#f1f5f9; --chip-border:#cbd5e1; --pill:#e2e8f0; --tip:#ffffff; --tipb:#cbd5e1; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.4 system-ui,Segoe UI,Roboto,Helvetica,Arial}
  header{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--grid);position:sticky;top:0;z-index:5}
  label{font-size:13px;display:flex;align-items:center;gap:6px}
  input[type="number"],input[type="range"],select{background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:6px 8px}
  
  /* Export Button Styles */
  .btn-export { border:1px solid #d0d0d0; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:bold; cursor:pointer; transition:0.2s; font-family: system-ui, sans-serif; }
  .btn-primary { background: #007aff; color: #fff; border:none; margin-left: auto;}
  .btn-primary:hover { background: #0062cc; }
  .btn-success { background: #10b981; color: #fff; border:none; }
  .btn-success:hover { background: #059669; }
  .btn-success-dark { background: #047857; color: #fff; border: none; }
  .btn-success-dark:hover { background: #065f46; }
  .btn-success-ultra { background: #064e3b; color: #fff; border: none; }
  .btn-success-ultra:hover { background: #022c22; }
  .btn-success-max { background: #022c22; color: #fff; border: none; }
  .btn-success-max:hover { background: #011f18; }
  
  #status{margin-left:10px;color:var(--muted);font-size:12px}
  #chart{width:100%;height:90vh}
  aside{position:absolute;top:60px;right:0;width:340px;height:calc(100% - 60px);overflow:auto;background:var(--panel);border-left:1px solid var(--grid);padding:12px}
  aside h3{margin:10px 0 6px;color:#334155;font-size:13px}
  .legend{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip);border:1px solid var(--chip-border);border-radius:999px;padding:4px 10px;cursor:pointer}
  .chip .sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,0.15)}
  .chip.inactive{opacity:.35}
  .pill{background:var(--pill);border:1px solid #cbd5e1;border-radius:999px;padding:6px 10px;cursor:pointer}
  .tip{position:fixed;pointer-events:none;background:var(--tip);border:1px solid var(--tipb);border-radius:6px;padding:6px 8px;font-size:12px;box-shadow:0 10px 28px rgba(15,23,42,.1);opacity:0;transition:opacity .12s}
  .note{color:var(--muted);font-size:12px;margin-top:6px}
</style>
</head>
<body>
<header>
  <button id="resetView" class="pill">↺ Reset View</button>
  
  <button onclick="exportChart('svg')" class="btn-export btn-primary" title="Preferred for journals">⬇ SVG</button>
  <button onclick="exportChart('png', 3.125)" class="btn-export btn-success" title="Standard Print Quality (~300 DPI)">⬇ 300 DPI</button>
  <button onclick="exportChart('png', 6.25)" class="btn-export btn-success-dark" title="Professional journal quality (~600 DPI)">⬇ 600 DPI</button>
  <button onclick="exportChart('png', 8.33)" class="btn-export btn-success-ultra" title="Maximum safe resolution (~800 DPI)">⬇ 800 DPI</button>
  <button onclick="exportChart('png', 12.5)" class="btn-export btn-success-max" title="Extreme resolution (~1200 DPI)">⬇ 1200 DPI</button>

  <div id="status">Loading data.csv…</div>
</header>

<svg id="chart"></svg>

<aside>
  <h3>Structure Group (Fill Color)</h3>
  <div id="structLegend" class="legend"></div>

  <h3>Filter ions (Border Color)</h3>
  <div id="ionLegend" class="legend"></div>
  <div style="display:flex;gap:8px;margin:6px 0 10px">
    <button id="ion-btn-all" class="pill">Select all</button>
    <button id="ion-btn-clear" class="pill">Clear all</button>
  </div>

  <div id="csv-fallback" style="display:none;margin:10px 0 14px">
    <button id="pick-csv" class="pill">Choose data.csv…</button>
    <input id="csv-input" type="file" accept=".csv" style="display:none">
    <div class="note">If you opened this file locally or on github.com, use this to load the CSV.</div>
  </div>

  <h3>Labels</h3>
  <label><input type="checkbox" id="showIonLbl" checked> Ion</label>
  <label><input type="checkbox" id="showStructLbl" checked> Structure</label>
  <label><input type="checkbox" id="showDopingLbl"> Doping</label>
  <label><input type="checkbox" id="showFormulaLbl"> Formula</label>

  <div class="note" style="margin-top:20px;">Hover over segments for details. Click Ion chip to filter. Click segment to zoom.</div>
</aside>

<div id="tooltip" class="tip"></div>

<script>
/* ---------- Palettes (Identical to Radial Tree) ---------- */
const ION_COLORS = {
  "Li+":  "#ff5252","Na+":  "#81d4fa","K+":   "#004d40","Ag+":  "#f48fb1",
  "O2-":  "#6d4c41","Zn2+": "#c2185b","H+":   "#ffd54f","Rb+":  "#43a047",
  "F-":   "#ff8a65","Cu+":  "#5c6bc0","Mg2+": "#26c6da","In3+": "#c0ca33",
  "I-":   "#ec407a","Sn4+": "#7e57c2"
};
const STRUCT_COLORS = {
  "Others":"#9e9e9e","Polymeric":"#ff7043","Argyrodite":"#ab47bc","Halide":"#26a69a",
  "Amorphous":"#f6bf26","NASICON":"#66bb6a","Anti-perovskite":"#0d47a1","Spinel":"#8d6e63"
};
const getIonColor    = n => ION_COLORS[n]    || "#9aa5b1";

/* ---------- Elements & State ---------- */
const svg = d3.select('#chart');
const tip = d3.select('#tooltip');
const say = t => (document.getElementById('status').textContent = t);
let DATA=null, COLS=null, WIDTH=0, HEIGHT=0, R=0;
let selectedIons = null;          
let ionLegEl = null;
let globalIonsList = []; 

function applyChipVisuals(){
  if(!ionLegEl) return;
  const chips = ionLegEl.querySelectorAll('.chip');
  if(selectedIons===null) chips.forEach(ch=>ch.classList.remove('inactive'));
  else if(selectedIons.size===0) chips.forEach(ch=>ch.classList.add('inactive'));
  else chips.forEach(ch=>ch.classList.toggle('inactive', !selectedIons.has(ch.dataset.ion)));
}

/* ---------- Robust CSV loader ---------- */
const CSV_URL = new URL('data.csv', document.baseURI).href;
async function loadCSVWithFallback(){
  try { return await d3.csv(CSV_URL); }
  catch(e){
    const fb=document.getElementById('csv-fallback'), btn=document.getElementById('pick-csv'), inp=document.getElementById('csv-input');
    if(!fb||!btn||!inp) throw e;
    fb.style.display='block';
    return await new Promise((resolve,reject)=>{
      btn.addEventListener('click', ()=>inp.click(), {once:true});
      inp.addEventListener('change', ()=>{
        const f = inp.files && inp.files[0]; if(!f) return reject(new Error('No file selected'));
        const r = new FileReader();
        r.onload = ()=>{ try{ resolve(d3.csvParse(r.result)); }catch(err){ reject(err); } };
        r.onerror = reject; r.readAsText(f);
      }, {once:true});
    });
  }
}

/* ---------- Helpers ---------- */
function buildLeaves(rows){
  const {ion,struct,doping,formula,sigma} = COLS;
  const sel = selectedIons;
  const leaves=[];
  for(const r of rows){
    const ionV=(r[ion]||'Other').toString().trim();
    if(sel!==null && !sel.has(ionV)) continue;
    const structV=(r[struct]||'Others').toString().trim();
    const dopV=(r[doping]||'(none)').toString().trim();
    const formV=(r[formula]||'(formula)').toString().trim();
    
    // Attempt to parse sigma just for the tooltip, Sunburst slices are usually sized equally by count
    const sStr = String(r[sigma]??'').trim().replace(/[,\s]/g,'').replace(/[−–—-]/g,'-').replace(/([0-9.]+)\s*(?:×|x|\*)\s*10\^?([+\-]?\d+)/i,'$1e$2');
    const s = Number(sStr);
    
    leaves.push({ion:ionV,structure:structV,dop:dopV,form:formV,sigma:Number.isFinite(s) ? s : NaN, value: 1});
  }
  return leaves;
}

function structColorFromNode(node){
  const structNode = node.ancestors().find(x => x.depth === 2);
  return STRUCT_COLORS[structNode?.data?.name] || STRUCT_COLORS["Others"];
}
function ionColorFromNode(node){
  const ionNode = node.ancestors().find(x => x.depth === 1) || node;
  return getIonColor(ionNode?.data?.name);
}

/* ---------- Draw Sunburst ---------- */
function drawSunburst(rows){
  let bb = document.getElementById('chart').getBoundingClientRect();
  if(!bb.width||!bb.height){
    const p = document.body.getBoundingClientRect();
    d3.select('#chart').attr('width', p.width).attr('height', Math.max(600, p.height*0.9));
    bb = document.getElementById('chart').getBoundingClientRect();
  }
  WIDTH=bb.width; HEIGHT=bb.height; R=Math.min(WIDTH,HEIGHT)/2 - 20;

  svg.attr('viewBox', `${-WIDTH/2} ${-HEIGHT/2} ${WIDTH} ${HEIGHT}`).selectAll('*').remove();
  const g = svg.append('g').attr('class','sunburst');

  const leaves = buildLeaves(rows);
  const root = {name:'root',children:[]};
  const grouped = d3.group(leaves, d=>d.ion, d=>d.structure, d=>d.dop);
  
  for(const [ion,g1] of grouped){
    const nIon={name:ion,children:[]};
    for(const [st,g2] of g1){
      const nSt={name:st,children:[]};
      for(const [dop,g3] of g2){
        const nD={name:dop,children:[]};
        for(const d of g3) nD.children.push({name:d.form,sigma:d.sigma, value: 1});
        nSt.children.push(nD);
      }
      nIon.children.push(nSt);
    }
    root.children.push(nIon);
  }

  const hierarchy = d3.hierarchy(root).sum(d => d.value).sort((a, b) => b.value - a.value);
  const rootPartition = d3.partition().size([2 * Math.PI, R])(hierarchy);

  const arc = d3.arc()
    .startAngle(d => d.x0)
    .endAngle(d => d.x1)
    .padAngle(d => Math.min((d.x1 - d.x0) / 2, 0.005))
    .padRadius(R / 2)
    .innerRadius(d => d.y0)
    .outerRadius(d => d.y1 - 1);

  // Draw the slices
  const paths = g.append("g")
    .selectAll("path")
    .data(rootPartition.descendants().filter(d => d.depth > 0))
    .join("path")
      .attr("fill", d => d.depth === 1 ? '#ffffff' : structColorFromNode(d))
      .attr("stroke", d => ionColorFromNode(d))
      .attr("stroke-width", d => d.depth === 1 ? 2.5 : 1)
      .attr("d", arc)
      .style("cursor", "pointer")
      .on("mousemove", (e, d) => showTip(e, d))
      .on("mouseleave", hideTip);

  // Add labels based on toggles
  const wantIon=document.getElementById('showIonLbl').checked;
  const wantStruct=document.getElementById('showStructLbl').checked;
  const wantDoping=document.getElementById('showDopingLbl').checked;
  const wantFormula=document.getElementById('showFormulaLbl').checked;

  g.append("g")
    .attr("pointer-events", "none")
    .attr("text-anchor", "middle")
    .selectAll("text")
    .data(rootPartition.descendants().filter(d => d.depth > 0 && (d.y0 + d.y1) / 2 * (d.x1 - d.x0) > 10))
    .join("text")
      .attr("transform", function(d) {
        const x = (d.x0 + d.x1) / 2 * 180 / Math.PI;
        const y = (d.y0 + d.y1) / 2;
        return `rotate(${x - 90}) translate(${y},0) rotate(${x < 180 ? 0 : 180})`;
      })
      .attr("dy", "0.35em")
      .attr("fill", "#0f172a")
      .attr("font-size", d => d.depth === 1 ? "14px" : (d.depth === 2 ? "12px" : "10px"))
      .attr("font-weight", d => d.depth === 1 ? "bold" : "normal")
      .text(d => {
          if (d.depth === 1 && wantIon) return d.data.name;
          if (d.depth === 2 && wantStruct) return d.data.name;
          if (d.depth === 3 && wantDoping) return d.data.name;
          if (d.depth === 4 && wantFormula) return d.data.name;
          return "";
      });

  // Safe Caption
  g.append('text').attr('class', 'chart-caption')
    .attr('x', -WIDTH/2 + 20).attr('y', -HEIGHT/2 + 30)
    .attr('text-anchor', 'start').attr('fill', '#64748b').attr('font-size', 13)
    .text('Sunburst: Ion → Structure → Doping → Formula • Fill = Structure • Border = Ion');
  
  say(`Segments: ${rootPartition.descendants().length - 1} • Entries: ${rootPartition.leaves().length}`);
}

/* ---------- Tooltip ---------- */
function showTip(e,d){
  const a=d.ancestors().reverse();
  const ion=a[1]?.data?.name||'(ion)';
  const st=a[2]?.data?.name||'(structure)';
  const dop=a[3]?.data?.name||'(doping)';
  
  let html = `<div style="font-family:system-ui,sans-serif;">`;
  if (d.depth >= 1) html += `<span style="color:${getIonColor(ion)}"><b>${ion}</b></span>`;
  if (d.depth >= 2) html += ` → <span style="color:${getStructColor(st)}"><b>${st}</b></span>`;
  if (d.depth >= 3) html += ` → ${dop}`;
  
  if(!d.children && d.depth === 4){
    const v=Number(d.data?.sigma);
    html+=`<br><br><b>${d.data?.name}</b>`;
    if (Number.isFinite(v)) html+=`<br>σ: ${v.toExponential(3)} S·cm⁻¹`;
  } else {
      html += `<br><br>Total Entries: <b>${d.value}</b>`;
  }
  html += `</div>`;
  
  tip.html(html).style('left',(e.clientX+12)+'px').style('top',(e.clientY+12)+'px').style('opacity',1);
}
function hideTip(){ tip.style('opacity',0); }

/* ---------- Legends & Init ---------- */
function buildLegends(rows){
  const strLegEl = document.getElementById('structLegend');
  strLegEl.innerHTML = '';
  const structs = Object.keys(STRUCT_COLORS).filter(k => k !== 'Others'); 
  structs.forEach(st => {
    const chip = document.createElement('div'); chip.className = 'chip'; chip.style.cursor = 'default';
    const sw = document.createElement('div'); sw.className = 'sw'; 
    sw.style.background = STRUCT_COLORS[st];
    sw.style.border = 'none';
    chip.appendChild(sw); chip.appendChild(document.createTextNode(st)); 
    strLegEl.appendChild(chip);
  });

  const ions=[...new Set(rows.map(r=>(r[COLS.ion]||'Other').toString().trim()))].sort((a,b)=>a.localeCompare(b));
  globalIonsList = ions; 
  ionLegEl=document.getElementById('ionLegend'); ionLegEl.innerHTML='';
  ions.forEach(i=>{
    const chip=document.createElement('div'); chip.className='chip'; chip.dataset.ion=i;
    const sw=document.createElement('div'); sw.className='sw'; 
    sw.style.background='#fff';
    sw.style.border=`2px solid ${getIonColor(i)}`;
    sw.style.borderRadius='50%';
    chip.appendChild(sw); chip.appendChild(document.createTextNode(i)); ionLegEl.appendChild(chip);
  });
  
  ionLegEl.addEventListener('click', ev=>{
    const chip=ev.target.closest('.chip'); if(!chip) return;
    const n=chip.dataset.ion;
    if(selectedIons===null) selectedIons=new Set([n]);
    else{ if(selectedIons.has(n)) selectedIons.delete(n); else selectedIons.add(n); }
    applyChipVisuals(); if(DATA) drawSunburst(DATA);
  });
  document.getElementById('ion-btn-all').onclick=()=>{ selectedIons=null; applyChipVisuals(); if(DATA) drawSunburst(DATA); };
  document.getElementById('ion-btn-clear').onclick=()=>{ selectedIons=new Set(); applyChipVisuals(); if(DATA) drawSunburst(DATA); };
  applyChipVisuals();
}

/* ---------- NATIVE D3 EXPORT PIPELINE - LEGEND ON THE RIGHT ---------- */
function getSVGString(svgNode) {
    svgNode.setAttribute('xlink', 'http://www.w3.org/1999/xlink');
    let cssStyleText = "";
    for (let i = 0; i < document.styleSheets.length; i++) {
        try {
            for (let j = 0; j < document.styleSheets[i].cssRules.length; j++) {
                cssStyleText += document.styleSheets[i].cssRules[j].cssText;
            }
        } catch (e) {}
    }
    const styleElement = document.createElement("style");
    styleElement.setAttribute("type", "text/css");
    styleElement.innerHTML = cssStyleText;
    const refNode = svgNode.hasChildNodes() ? svgNode.children[0] : null;
    svgNode.insertBefore(styleElement, refNode);
    
    const serializer = new XMLSerializer();
    let svgString = serializer.serializeToString(svgNode);
    svgString = svgString.replace(/(\w+)?:?xlink=/g, 'xmlns:xlink=').replace(/NS\d+:href/g, 'xlink:href');
    
    svgNode.removeChild(styleElement);
    return svgString;
}

async function exportChart(format, scale = 4) {
    const svgEl = document.getElementById("chart");
    const d3Svg = d3.select(svgEl);
    const origViewBox = svgEl.getAttribute("viewBox");

    const bbox = svgEl.getBBox();
    const pad = 60;
    const truePhysicalWidth = bbox.width + (pad * 2);
    const truePhysicalHeight = Math.max(HEIGHT, bbox.height + (pad * 2));

    const legendWidth = 280; 
    const exportWidth = truePhysicalWidth + legendWidth;
    const exportHeight = truePhysicalHeight;
    
    const minX = bbox.x - pad;
    const minY = bbox.y - pad;

    d3Svg.attr("viewBox", `${minX} ${minY} ${exportWidth} ${exportHeight}`);
    d3Svg.selectAll(".chart-caption").style("display", "none");

    d3Svg.insert("rect", ":first-child")
        .attr("id", "export-bg")
        .attr("x", minX).attr("y", minY)
        .attr("width", exportWidth).attr("height", exportHeight)
        .attr("fill", "#ffffff");

    const exportGroup = d3Svg.append("g").attr("id", "export-elements");
    
    const legX = (bbox.x + bbox.width) + pad; 
    let curY = minY + 60; 

    // --- DRAW CHART KEY ---
    exportGroup.append("text").attr("x", legX).attr("y", curY).text("Chart Key")
        .attr("font-weight", "bold").attr("font-size", "16px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
    curY += 24;
    exportGroup.append("text").attr("x", legX).attr("y", curY).text("• Ion → Structure → Doping → Formula")
        .attr("font-size", "14px").attr("font-family", "system-ui, sans-serif").attr("fill", "#64748b");
    curY += 40;

    // --- DRAW STRUCTURE LEGEND ---
    exportGroup.append("text").attr("x", legX).attr("y", curY).text("Structure Group (Fill)")
        .attr("font-weight", "bold").attr("font-size", "16px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
    curY += 28;

    Object.keys(STRUCT_COLORS).filter(k=>k!=='Others').forEach(st => {
        exportGroup.append("rect").attr("x", legX).attr("y", curY - 12)
            .attr("width", 14).attr("height", 14).attr("rx", 3)
            .attr("fill", STRUCT_COLORS[st]).attr("stroke", "rgba(0,0,0,0.15)");
            
        exportGroup.append("text").attr("x", legX + 24).attr("y", curY)
            .text(st)
            .attr("font-size", "14px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
        
        curY += 24;
    });

    curY += 30;

    // --- DRAW ION LEGEND ---
    exportGroup.append("text").attr("x", legX).attr("y", curY).text("Ion Type (Border)")
        .attr("font-weight", "bold").attr("font-size", "16px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
    curY += 28;

    globalIonsList.forEach(ion => {
        if(selectedIons === null || selectedIons.has(ion)) {
            exportGroup.append("circle")
                .attr("cx", legX + 7).attr("cy", curY - 5).attr("r", 6)
                .attr("fill", "#ffffff").attr("stroke", getIonColor(ion)).attr("stroke-width", 2.5);
                
            exportGroup.append("text").attr("x", legX + 24).attr("y", curY)
                .text(ion)
                .attr("font-size", "14px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
            
            curY += 24;
        }
    });

    const svgString = getSVGString(svgEl);

    if (format === 'svg') {
        const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = "Sunburst_Publication.svg";
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    } else {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d"); 
        
        canvas.width = exportWidth * scale; 
        canvas.height = exportHeight * scale;
        
        const img = new Image();
        const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(svgBlob);

        await new Promise(resolve => { 
            img.onload = () => { 
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height); 
                URL.revokeObjectURL(url); 
                const link = document.createElement("a"); 
                link.download = `Sunburst_${Math.round(scale * 96)}DPI.png`; 
                link.href = canvas.toDataURL("image/png"); 
                document.body.appendChild(link); link.click(); document.body.removeChild(link); 
                resolve(); 
            }; 
            img.src = url; 
        });
    }

    d3Svg.select("#export-elements").remove();
    d3Svg.select("#export-bg").remove();
    d3Svg.selectAll(".chart-caption").style("display", null);
    d3Svg.attr("viewBox", origViewBox);
}

/* ---------- Controls ---------- */
["showIonLbl","showStructLbl","showDopingLbl","showFormulaLbl"].forEach(id => { 
    const el=document.getElementById(id); if(el) el.addEventListener('input', ()=>DATA&&drawSunburst(DATA)); 
});
document.getElementById('resetView').addEventListener('click', ()=>DATA&&drawSunburst(DATA));
window.addEventListener('resize', ()=>DATA&&drawSunburst(DATA));

/* ---------- Init ---------- */
async function init(){
  say('Loading data.csv…');
  const rows = await loadCSVWithFallback();
  if(!rows?.length){ say('No rows found in data.csv'); return; }

  COLS = {
    ion:"Ion Type",
    struct:"Structure Group",
    doping:"Doping / and or GB Strategy",
    formula:"Superionic Conductor Formula (Chemical)",
    sigma:"Conductivity σ (S/cm)"
  };

  DATA = rows;
  buildLegends(rows);

  selectedIons=null; applyChipVisuals();
  await new Promise(r => requestAnimationFrame(()=>requestAnimationFrame(r)));
  drawSunburst(DATA);
}
init();
</script>
</body>
</html>
