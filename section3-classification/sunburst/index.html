<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Sunburst - Premium Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  :root { --bg:#ffffff; --panel:#f8fafc; --grid:#e5e7eb; --ink:#0f172a; --muted:#64748b; }
  html, body { height:100%; margin:0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column;
    font-size: 13px;
  }
  
  header {
    padding: 12px 16px; background: var(--panel);
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--grid);
    position: sticky; top: 0; z-index: 5;
  }
  
  label { font-size: 12px; display: flex; align-items: center; gap: 6px; font-weight: 600; color: #334155; }
  
  .btn { border: 1px solid #d0d0d0; background: #fff; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn:hover { filter: brightness(0.95); border-color: #aaa; }
  .btn-primary { background: #007aff; color: #fff; border: none; margin-left: auto; }
  .btn-success { background: #10b981; color: #fff; border: none; }

  #wrap { flex: 1; display: flex; padding: 16px; gap: 16px; min-height: 0; }
  #chartCard {
    flex: 1; display: grid; grid-template-columns: minmax(640px, 1.7fr) 300px;
    gap: 16px; align-items: start; min-height: 0;
  }
  
  .chartBody {
    background: #ffffff; border: 1px solid var(--grid); border-radius: 12px;
    position: relative; height: min(88vh, 900px); min-height: 560px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
  }
  svg { width: 100%; height: 100%; display: block; }

  /* Premium Sidebar Styling */
  .sidebar {
    background: #ffffff; border: 1px solid var(--grid); border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; gap: 16px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.02); max-height: calc(100vh - 120px); overflow-y: auto;
  }
  .sidebar h4 { margin: 0; font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .legendGroup { display: flex; flex-direction: column; gap: 4px; }

  .ionRow {
    display: grid; grid-template-columns: 16px 1fr auto;
    gap: 10px; align-items: center; padding: 8px 10px; border-radius: 8px;
    user-select: none; transition: 0.15s; cursor: pointer; border: 1px solid transparent;
  }
  .ionRow:hover { background: #f8fafc; border-color: #e2e8f0; }
  .swatch { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,.15); }

  .pill { background: #f1f5f9; border: 1px solid #e2e8f0; color: #334155; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 11px; font-weight: 600; width: 100%; text-align: center; transition: 0.15s;}
  .pill:hover { background: #e2e8f0; color: #0f172a; }

  .tooltip {
    position: fixed; pointer-events: none; background: rgba(15,23,42,.95);
    color: #fff; padding: 12px 14px; border-radius: 8px; font-size: 12px; line-height: 1.5;
    display: none; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,.2);
    backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1);
  }

  .label, .leafLabel {
    fill: #0f172a; pointer-events: none;
    paint-order: stroke; stroke: #ffffff; stroke-width: 4px; stroke-linecap: round; stroke-linejoin: round;
  }

  .dimmed { opacity: 0.1; transition: opacity .2s ease; }

  .cap text {
    font-size: 10px; fill: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    paint-order: stroke; stroke: #ffffff; stroke-width: 4px; stroke-linecap: round; stroke-linejoin: round;
  }

  .crumbs { font-size: 13px; color: #64748b; font-weight: 600; margin-left: 10px;}
  .crumbs a { color: #0ea5e9; text-decoration: none; cursor: pointer; transition: 0.15s; }
  .crumbs a:hover { color: #0284c7; text-decoration: underline; }
  
  /* Fallback Box */
  #csv-fallback { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 8px; padding: 12px; margin-bottom: 16px; }
  #csv-fallback p { margin: 0 0 8px 0; font-size: 11px; color: #be123c; font-weight: 600; }
</style>
</head>
<body>
  <header>
    <span id="crumbs" class="crumbs"></span>
    
    <button onclick="exportChart('svg')" class="btn btn-primary">⬇ Journal SVG</button>
    <button onclick="exportChart('png')" class="btn btn-success">⬇ 300DPI PNG</button>
  </header>

  <div id="wrap">
    <div id="chartCard">
      <div id="chart" class="chartBody"></div>

      <div class="sidebar">
        
        <div id="csv-fallback" style="display:none;">
          <p>Browser blocked local auto-load.<br>Please select your file:</p>
          <button id="pick-csv" class="pill" style="background: #fff; border-color: #fecdd3; color:#be123c;">Choose data.csv…</button>
          <input id="csv-input" type="file" accept=".csv" style="display:none">
        </div>

        <div>
            <h4>Filter by Ion Family</h4>
            <div id="ionLegend" class="legendGroup" style="margin-top: 8px;"></div>
        </div>

        <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid #f1f5f9;">
            <button id="btnClearSel" class="pill">Clear Filter Selection</button>
        </div>

      </div>
    </div>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
  // ---------------- Tunables ----------------
  const DEF_COND = 1e-6;
  const SCALE_MODE = 'log';
  const RING_SCALE = [1.0, 1.35, 1.55];  
  const LEAF_SCALE = [1.0, 1.45, 1.6];
  const CAP_ARC_DEG = 90;

  // PURE ION COLOR PALETTE
  const ION_COLORS = {
    "Li+": "#ef4444", "Na+": "#0ea5e9", "K+": "#10b981", "Ag+": "#f43f5e",
    "O2-": "#8b5cf6", "Zn2+": "#d946ef", "H+": "#f59e0b", "Rb+": "#84cc16",
    "F-": "#f97316", "Cu+": "#6366f1", "Mg2+": "#06b6d4", "In3+": "#eab308",
    "I-": "#ec4899", "Sn4+": "#a855f7"
  };
  const getIonColor = n => ION_COLORS[n] || "#94a3b8";

  const SUPERSCRIPTS = { "-10":"⁻¹⁰", "-9":"⁻⁹", "-8":"⁻⁸", "-7":"⁻⁷", "-6":"⁻⁶", "-5":"⁻⁵", "-4":"⁻⁴", "-3":"⁻³", "-2":"⁻²", "-1":"⁻¹", "0":"⁰" };
  const formatLogLabel = val => `10${SUPERSCRIPTS[Math.round(Math.log10(val))] || '^' + Math.round(Math.log10(val))}`;

  // ---------------- State ----------------
  let fullHierarchy=null, idMap=new Map(), focusNode=null;
  let maxRGlobal=0;
  let _nodesCache=null, _outerR=null, _defs=null, _g=null, _focusDepth=0, _ringThickness=0, _leafBase=0;

  const selIons = new Set();
  const ui = {};

  // ---------------- MANUAL FILE LOADER ----------------
  async function loadCSVWithFallback() {
    try { 
      return await d3.csv(new URL('data.csv', document.baseURI).href, d3.autoType); 
    } catch(e) {
      const fb = document.getElementById('csv-fallback'), btn = document.getElementById('pick-csv'), inp = document.getElementById('csv-input');
      if (!fb || !btn || !inp) throw e;
      fb.style.display = 'block'; 
      return await new Promise((resolve, reject) => {
        btn.addEventListener('click', () => inp.click(), {once:true});
        inp.addEventListener('change', () => {
          const f = inp.files && inp.files[0]; 
          if (!f) return reject(new Error('No file selected'));
          const r = new FileReader();
          r.onload = () => { 
            try { resolve(d3.csvParse(r.result, d3.autoType)); fb.style.display = 'none'; } catch(err) { reject(err); } 
          };
          r.onerror = reject; r.readAsText(f);
        }, {once:true});
      });
    }
  }

  // ---------------- Boot ----------------
  document.addEventListener('DOMContentLoaded', async ()=>{
    ui.btnClearSel = document.getElementById('btnClearSel');
    
    ui.btnClearSel.onclick = ()=>{
      selIons.clear();
      document.querySelectorAll('.legendGroup input[type="checkbox"]').forEach(cb=>{ cb.checked=false; });
      applyLegendFilter();
    };

    try {
      const csvRows = await loadCSVWithFallback();
      const dataObj = rowsToNested(csvRows);
      fullHierarchy = buildHierarchy(dataObj);
      draw();
    } catch(e) {
      document.getElementById('chart').innerHTML = `<div style="padding:20px;color:red;font-weight:bold;">Critical Error loading data.</div>`;
    }

    window.addEventListener('resize', ()=>{ clearTimeout(window._rz); window._rz=setTimeout(draw,120); });
  });

  // ---------------- Build hierarchy ----------------
  function obj2children(obj){
    return Object.entries(obj).map(([ion, structures])=>({
      name:ion,
      children:Object.entries(structures||{}).map(([structure, strategies])=>({
        name:structure,
        children:Object.entries(strategies||{}).map(([strategy, formulas])=>({
          name:strategy,
          children:Object.entries(formulas||{}).map(([formula, vals])=>{
            const nums=Array.isArray(vals)?vals.map(Number).filter(x=>Number.isFinite(x)&&x>0):[];
            return { name:formula, values:nums };
          })
        }))
      }))
    }));
  }
  let _uid=1;
  function assignUids(root){ root.each(n=>{ n.data._uid=_uid++; idMap.set(n.data._uid, n); }); }
  
  function rowsToNested(rows){
    const root = {};
    const get = (obj, key) => (obj[key] ??= {});

    rows.forEach(r=>{
      const ion     = String(r['Ion Type'] ?? '').trim();
      const struct  = String(r['Structure Group'] ?? '').trim();
      const strat   = String(r['Doping / and or GB Strategy'] ?? '').trim();
      const formula = String(r['Superionic Conductor Formula (Chemical)'] ?? '').trim();
      const rawCond = r['Conductivity σ (S/cm)'];

      if (!ion || !struct || !strat || !formula) return;

      const ionObj    = get(root, ion);
      const structObj = get(ionObj, struct);
      const stratObj  = get(structObj, strat);

      const arr = (stratObj[formula] ??= []);
      const c = (typeof rawCond === 'number') ? rawCond : +String(rawCond).replace(/[, ]/g,'');
      if (Number.isFinite(c) && c > 0) arr.push(c);
    });
    return root;
  }

  function buildHierarchy(dataObj){
    const data={ name:'root', children:obj2children(dataObj) };
    const root=d3.hierarchy(data, d=>d.children)
      .sum(d => Array.isArray(d?.values) ? 1 : 0)
      .sort((a,b)=>(b.value||0)-(a.value||0));
    root.each(n=>{
      if (Array.isArray(n.data.values)) {
        const vals = n.data.values.filter(Number.isFinite);
        n.data.cond = vals.length ? vals[0] : DEF_COND;
        n.data.hasCond = vals.length>0;
      }
    });
    assignUids(root);
    return root;
  }

  function makeFocusRoot(){
    if (!focusNode || focusNode.depth===0) return fullHierarchy.copy();
    const clone = d3.hierarchy({
      name:focusNode.data.name, _uid:focusNode.data._uid,
      children: focusNode.children?.map(child=>cloneData(child))
    }, d=>d.children);
    clone.sum(d=>Array.isArray(d?.values)?1:0).sort((a,b)=>(b.value||0)-(a.value||0));
    clone.each(n=>{
      if (Array.isArray(n.data.values)) {
        const vals=n.data.values.filter(Number.isFinite);
        n.data.cond = vals.length ? vals[0] : DEF_COND;
        n.data.hasCond = vals.length>0;
      }
    });
    return clone;
  }
  
  function cloneData(node){ return { name:node.data.name, values:node.data.values, _uid:node.data._uid, children: node.children?.map(c=>cloneData(c)) }; }

  function absoluteNames(node){
    const orig = idMap.get(node.data._uid);
    let ion=null, struct=null, strat=null;
    if (!orig) return {ion,struct,strat};
    const chain = orig.ancestors().reverse();
    if (chain[1]) ion = chain[1].data.name;
    if (chain[2]) struct = chain[2].data.name;
    if (chain[3]) strat = chain[3].data.name;
    return {ion,struct,strat};
  }
  
  // ---------------- NEW: PREMIUM LOTUS SHADING ----------------
  function nodeFill(d){
    if (d.depth === 0) return '#f8fafc'; 
    const names = absoluteNames(d);
    const baseColor = getIonColor(names.ion || 'Other'); 
    
    const color = d3.color(baseColor);
    if(color && d.depth > 0) {
        // Fade the opacity slightly based on depth to create a layered 3D effect
        color.opacity = Math.max(0.4, 1 - ((d.depth - 1) * 0.15));
        return color.formatRgb();
    }
    return baseColor;
  }

  function levelOf(d){
    const orig = idMap.get(d.data._uid);
    const od = orig?.depth ?? 0; 
    return od===1 ? 'ion' : od===2 ? 'struct' : od===3 ? 'strat' : 'formula';
  }

  // ---------------- Draw ----------------
  function draw(){
    const chartEl=document.getElementById('chart');
    const legendEl=document.getElementById('ionLegend');
    chartEl.innerHTML=''; 

    const rect=chartEl.getBoundingClientRect();
    const side=Math.min(Math.max(560, rect.width), Math.max(560, rect.height));

    const root = makeFocusRoot();
    _focusDepth = (focusNode?.depth ?? 0);

    const ringScale=RING_SCALE[Math.min(_focusDepth, RING_SCALE.length-1)];
    const leafScale=LEAF_SCALE[Math.min(_focusDepth, LEAF_SCALE.length-1)];
    _ringThickness=Math.max(44, side*0.085)*ringScale;
    _leafBase=Math.max(12, side*0.03);
    const extraLeafMax=Math.max(90, side*0.22)*leafScale;

    d3.partition().size([2*Math.PI, (root.height + 1) * _ringThickness])(root);

    const condVals=root.leaves().map(l=>l.data.cond||DEF_COND);
    let [cmin,cmax]=d3.extent(condVals); if(!(cmax>cmin)){ cmin=Math.max(1e-12,cmin*0.8); cmax=cmin*10; }
    const baseScale=(SCALE_MODE==='linear'? d3.scaleLinear().domain([cmin,cmax])
                                          : d3.scaleLog().domain([Math.max(cmin,1e-12), Math.max(cmax,1e-12)]));
    const condScale=baseScale.range([0,extraLeafMax]).clamp(true);

    _outerR = d => d.children ? d.y1 : d.y1 + _leafBase + condScale(d.data.cond || DEF_COND);
    const maxR = d3.max(root.descendants(), d=>_outerR(d)) + 6; maxRGlobal = maxR;

    const svg=d3.select(chartEl).append('svg').attr('width','100%').attr('height','100%')
      .attr('viewBox', `${-maxR} ${-maxR} ${maxR*2} ${maxR*2}`);
    _g=svg.append('g'); _defs=svg.append('defs');

    const arc=d3.arc().startAngle(d=>d.x0).endAngle(d=>d.x1)
      .padAngle(d=>Math.min(0.006,(d.x1-d.x0)/6)).padRadius(maxR*0.9)
      .innerRadius(d=>d.y0).outerRadius(d=>_outerR(d));

    const nodes = root.descendants().filter(d => d.depth>0);
    _nodesCache = nodes;

    // Premium Crisp 1px White Strokes
    const paths=_g.selectAll('path.slice').data(nodes, d=>d.data._uid).join('path')
      .attr('class','slice')
      .attr('d', arc)
      .attr('fill', d=>{
        const base = nodeFill(d);
        if (!d.children && !d.data.hasCond){ const c=d3.color(base); c.opacity=0.3; return c.formatRgb(); }
        return base;
      })
      .attr('stroke','#ffffff').attr('stroke-opacity',1.0)
      .attr('stroke-width', d => (d.x1-d.x0) < 0.002 ? 0 : 1) // Forced 1px crisp borders
      .style('cursor', d => d.children ? 'pointer' : 'default')
      .style('transition', 'fill 0.2s ease'); // Smooth hover

    paths.each(function(d){
      const names = absoluteNames(d);
      this.dataset.ion = names.ion || '';
    });

    const tipVal=v=>(!Number.isFinite(v)?'n/a':(v<0.01?`${(v*1000).toFixed(3)} mS·cm⁻¹`:`${Number(v).toPrecision(3)} S·cm⁻¹`));
    
    paths.on('mouseover', function() { d3.select(this).attr('stroke-width', 2).raise(); }) // Highlight on hover
         .on('mousemove',(evt,d)=>{
            const trail = d.ancestors().reverse().slice(1).map(n=>n.data.name).join(' &rarr; ');
            let html=`<div>`;
            if(!d.children) {
                html += `<div style="font-size:14px; font-weight:700; margin-bottom:4px;">${d.data.name}</div>`;
                html += `<div style="font-size:11px; color:#cbd5e1; margin-bottom:6px;">${trail.split(' &rarr; ').slice(0,-1).join(' &rarr; ')}</div>`;
                html += `<div style="font-size:13px; color:#38bdf8; font-family:monospace;">σ: ${tipVal(d.data.cond)}</div>`;
            } else {
                html += `<div style="font-size:13px; font-weight:700; margin-bottom:4px;">${trail}</div>`;
                html += `<div style="color:#94a3b8; font-size:11px;">Sub-formulas: ${d.value}</div>`;
            }
            html += '</div>';
            const tt=document.getElementById('tooltip');
            tt.style.display='block'; tt.innerHTML=html;
            tt.style.left=(evt.clientX+15)+'px'; tt.style.top=(evt.clientY+15)+'px';
         })
         .on('mouseleave', function(evt, d) { 
             d3.select(this).attr('stroke-width', (d.x1-d.x0) < 0.002 ? 0 : 1);
             document.getElementById('tooltip').style.display='none'; 
         });

    paths.on('click',(evt,d)=>{
      if(!d.children) return; 
      const full = idMap.get(d.data._uid);
      if (focusNode && full === focusNode) { focusNode = focusNode.parent || null; }
      else { focusNode = full; }
      selIons.clear(); 
      draw();
    });

    const backR = Math.max(20, (midForDepth(root, 1)) * 0.45);
    _g.append('circle')
      .attr('r', backR)
      .attr('fill', '#ffffff')
      .attr('stroke', '#e2e8f0')
      .attr('stroke-width', 2)
      .style('cursor', focusNode ? 'pointer' : 'default')
      .on('click', ()=>{ if (focusNode){ focusNode = focusNode.parent || null; selIons.clear(); draw(); }});
    
    _g.append('text')
      .attr('text-anchor','middle').attr('dy','0.35em')
      .style('font-size','14px').style('font-weight','700').style('fill','#0f172a').style('font-family', 'inherit')
      .text(focusNode ? focusNode.data.name : 'All Ions');

    // DRAWING ORDER: Labels -> Caps -> Axes
    layoutLabels();
    renderRingCaptions(root);

    // CONCENTRIC LOG RINGS ON TOP
    const axesGroup = _g.append('g').attr('class', 'axes');
    const tickVals = [1e-8, 1e-6, 1e-4, 1e-2]; 
    
    let d3Node = root.descendants().find(d => d.depth === 3);
    let baseLeafY = d3Node ? d3Node.y1 : (3 * _ringThickness);

    tickVals.forEach(v => {
        if (v < cmin || v > cmax) return;
        const r = baseLeafY + _leafBase + condScale(v);
        
        axesGroup.append('circle')
            .attr('r', r)
            .attr('fill', 'none')
            .attr('stroke', '#cbd5e1')
            .attr('stroke-dasharray', '4,4');
            
        axesGroup.append('text')
            .attr('y', -r - 4) 
            .attr('x', 0)
            .attr('text-anchor', 'middle')
            .attr('fill', '#64748b')
            .attr('font-size', '10px')
            .attr('font-weight', '700')
            .text(formatLogLabel(v));
    });

    renderCrumbs();
    
    if(!legendEl.hasChildNodes()) buildLegend(legendEl);
    applyLegendFilter();
  }

  // ---------------- Legend ----------------
  function buildLegend(container){
    container.innerHTML='';
    const ions = Array.from(new Set(fullHierarchy.leaves().map(d => absoluteNames(d).ion))).filter(Boolean).sort((a,b)=>a.localeCompare(b));

    ions.forEach(ion=>{
      const row = document.createElement('label'); row.className='ionRow';
      const sw = document.createElement('div'); sw.className = 'swatch'; sw.style.background = getIonColor(ion);
      const title = document.createElement('div'); const pick = document.createElement('input'); pick.type='checkbox';

      title.textContent = ion;
      title.style.fontSize = '13px'; title.style.fontWeight = '600';
      pick.checked = selIons.has(ion);

      pick.onchange = ()=>{
          if (pick.checked) selIons.add(ion); else selIons.delete(ion);
          applyLegendFilter();
      };
      row.append(sw, title, pick); container.appendChild(row);
    });
  }

  // ---------------- Selection filter ----------------
  function applyLegendFilter(){
    const hasSel = (selIons.size > 0);
    d3.selectAll('path.slice').each(function(){
      const ion = this.dataset.ion || '';
      let on = true;
      if (hasSel){ on = selIons.has(ion); }
      this.classList.toggle('dimmed', hasSel && !on);
    });

    d3.selectAll('.labels text.levelLabel').each(function(d){
      const names = absoluteNames(d);
      let on = true;
      if (hasSel){ on = selIons.has(names.ion||''); }
      const sel = d3.select(this);
      if (hasSel && !on){
        sel.style('display','none').classed('dimmed', false);
      } else {
        sel.style('display', null).classed('dimmed', false);
      }
    });
  }

  // ---------------- Breadcrumbs ----------------
  function renderCrumbs(){
    const el=document.getElementById('crumbs');
    if (!focusNode || focusNode.depth===0){
      el.innerHTML='<a data-ix="root">Sunburst Root</a>';
      el.querySelector('a').onclick=()=>{ focusNode=null; selIons.clear(); draw(); };
      return;
    }
    const chain=focusNode.ancestors().reverse().slice(1);
    el.innerHTML=['<a data-ix="root">Sunburst Root</a>', ...chain.map((n,i)=>` <span style="color:#cbd5e1; margin:0 4px;">/</span> <a data-ix="${i}">${n.data.name}</a>`)].join('');
    el.querySelectorAll('a').forEach(a=>{
      a.onclick=()=>{ const ix=a.getAttribute('data-ix'); focusNode = (ix==='root') ? null : chain[Number(ix)]; selIons.clear(); draw(); };
    });
  }

  // ---------------- AUTO-RESPONSIVE LABELS ----------------
  function layoutLabels(){
    _g.selectAll('.labels').remove();
    const layer = _g.append('g').attr('class','labels');

    let data = [];
    data = data.concat(_nodesCache.filter(n => n.children && levelOf(n)==='ion'));
    data = data.concat(_nodesCache.filter(n => n.children && levelOf(n)==='struct'));
    data = data.concat(_nodesCache.filter(n => n.children && levelOf(n)==='strat'));
    data = data.concat(_nodesCache.filter(n => levelOf(n)==='formula')); // Added Formula back

    const sel = layer.selectAll('text.levelLabel')
      .data(data, d=>`${d.data._uid}-${levelOf(d)}`)
      .join('text')
      .attr('class', 'label visibleLabel levelLabel')
      .text(d=> d.data.name)
      .style('font-size', d=>{
        const lv = levelOf(d);
        return lv==='ion' ? '14px' : lv==='struct' ? '13px' : lv==='strat' ? '11px' : '10px';
      })
      .style('font-weight', d=>{
        const lv = levelOf(d);
        return lv==='ion' ? 700 : lv==='struct' ? 600 : 500;
      });

    selection = sel;
    selection.each(function(d){
      const el = d3.select(this);
      const angleDeg = (d.x1 - d.x0) * 180 / Math.PI;
      
      // AUTO-HIDE MAGIC: If the slice is too narrow, do not draw the text. 
      // It reappears automatically when the user zooms in!
      if (angleDeg < 2.5) { el.style('display', 'none'); return; }

      const lv = levelOf(d);
      const isLeaf = (lv === 'formula');
      
      let rMid;
      if (isLeaf) {
        rMid = _outerR(d) + 6; 
      } else {
        rMid = (d.y0 + d.y1) / 2; 
      }

      let amid = (d.x0 + d.x1) / 2;
      if (d.x0 < 0 && d.x1 > 0) amid += 0.01;

      const deg = amid * 180 / Math.PI;
      const upright = !(amid > Math.PI/2 && amid < 3*Math.PI/2);

      el.attr('dy','0.32em')
        .attr('text-anchor', isLeaf ? (upright ? 'start' : 'end') : 'middle')
        .attr('transform', `rotate(${deg-90}) translate(${rMid},0) rotate(${upright?0:180})`)
        .style('opacity', 1)
        .style('display', null);
    });
  }


  // ---------------- Ring captions ----------------
  function ensureCaptionLayers(){
    if (!window._capLayers){
      window._capLayers = {
        ion:     _g.append('g').attr('class','cap cap-ion'),
        struct:  _g.append('g').attr('class','cap cap-struct'),
        strat:   _g.append('g').attr('class','cap cap-strat'),
        formula: _g.append('g').attr('class','cap cap-formula'),
      };
    }
    _capLayers.ion.selectAll('*').remove();
    _capLayers.struct.selectAll('*').remove();
    _capLayers.strat.selectAll('*').remove();
    _capLayers.formula.selectAll('*').remove();
  }
  function midForDepth(partitionRoot, depth){
    const n = partitionRoot.descendants().find(d => d.depth === depth);
    return n ? (n.y0 + n.y1) / 2 : (depth + 0.5) * _ringThickness;
  }
  function renderRingCaptions(partitionRoot){
    ensureCaptionLayers();
    if (!_defs) return;
    _defs.selectAll('path.ringArc').remove();

    const a0 = (-90 - CAP_ARC_DEG/2) * Math.PI/180;
    const a1 = (-90 + CAP_ARC_DEG/2) * Math.PI/180;
    function arcPath(r, a0, a1){
      const x0 = r * Math.cos(a0), y0 = r * Math.sin(a0);
      const x1 = r * Math.cos(a1), y1 = r * Math.sin(a1);
      const largeArc = (a1 - a0) % (2*Math.PI) > Math.PI ? 1 : 0;
      return `M ${x0.toFixed(3)} ${y0.toFixed(3)} A ${r.toFixed(3)} ${r.toFixed(3)} 0 ${largeArc} 1 ${x1.toFixed(3)} ${y1.toFixed(3)}`;
    }

    const rIon    = midForDepth(partitionRoot, 1);
    const rStruct = midForDepth(partitionRoot, 2);
    const rStrat  = midForDepth(partitionRoot, 3);
    const maxDepth = partitionRoot.height;
    const lastBand = partitionRoot.descendants().find(d => d.depth === maxDepth);
    const rFormula = (lastBand?.y1 ?? ((maxDepth+1) * _ringThickness)) + (_leafBase * 0.55);

    const items = [
      { key:'ion',     text:'Ion Type',                       r:rIon    },
      { key:'struct',  text:'Structure Group',                r:rStruct },
      { key:'strat',   text:'Doping / Strategy',              r:rStrat  },
      { key:'formula', text:'Superionic Formula',             r:rFormula}
    ];

    items.forEach((it)=>{
      if (!Number.isFinite(it.r) || it.r <= 0) return;
      const id = `ringcap-${Math.floor(it.r)}-${it.key}`;
      const d  = arcPath(it.r, a0, a1);
      _defs.append('path').attr('id', id).attr('d', d);
      const layer = _capLayers[it.key];
      layer.append('text')
        .append('textPath')
        .attr('href', '#'+id)
        .attr('startOffset','50%')
        .attr('text-anchor','middle')
        .text(it.text);
    });

    _capLayers.ion.raise(); _capLayers.struct.raise(); _capLayers.strat.raise(); _capLayers.formula.raise();
  }


  /* ---------- NATIVE D3 EXPORT PIPELINE ---------- */
  function getSVGString(svgNode) {
      svgNode.setAttribute('xlink', 'http://www.w3.org/1999/xlink');
      let cssStyleText = "";
      for (let i = 0; i < document.styleSheets.length; i++) {
          try {
              for (let j = 0; j < document.styleSheets[i].cssRules.length; j++) { cssStyleText += document.styleSheets[i].cssRules[j].cssText; }
          } catch (e) {}
      }
      const styleElement = document.createElement("style"); styleElement.setAttribute("type", "text/css"); styleElement.innerHTML = cssStyleText;
      const refNode = svgNode.hasChildNodes() ? svgNode.children[0] : null; svgNode.insertBefore(styleElement, refNode);
      const serializer = new XMLSerializer();
      let svgString = serializer.serializeToString(svgNode);
      svgString = svgString.replace(/(\w+)?:?xlink=/g, 'xmlns:xlink='); svgString = svgString.replace(/NS\d+:href/g, 'xlink:href');
      svgNode.removeChild(styleElement); return svgString;
  }

  async function exportChart(format) {
      const svgEl = document.querySelector("#chart svg"); const d3Svg = d3.select(svgEl);
      const pad = 120; const legendWidth = 240; 
      const currentViewBox = svgEl.getAttribute("viewBox").split(" ").map(Number);
      const [origX, origY, origW, origH] = currentViewBox;

      const exportMinX = origX - pad; const exportMinY = origY - pad;
      const exportW = origW + (pad * 2) + legendWidth; const exportH = origH + (pad * 2);

      d3Svg.attr("viewBox", `${exportMinX} ${exportMinY} ${exportW} ${exportH}`);
      d3Svg.insert("rect", ":first-child").attr("id", "export-bg").attr("x", exportMinX).attr("y", exportMinY).attr("width", exportW).attr("height", exportH).attr("fill", "#ffffff");

      const exportGroup = d3Svg.append("g").attr("id", "export-elements");
      exportGroup.append("text").attr("x", exportMinX + 40).attr("y", exportMinY + 60).text("Ion → Structure → Doping → Formula • slice length ∝ log₁₀(σ) • color = Ion Type").attr("font-size", "16px").attr("font-weight", "600").attr("font-family", "inherit").attr("fill", "#64748b");

      const legX = origX + origW + (pad/2) - 40; let curY = exportMinY + 60; 
      exportGroup.append("text").attr("x", legX).attr("y", curY).text("Ion Type").attr("font-weight", "bold").attr("font-size", "16px").attr("font-family", "inherit");
      curY += 28;

      const ionCounts = {};
      fullHierarchy.leaves().forEach(d => { const ion = absoluteNames(d).ion || 'Other'; ionCounts[ion] = (ionCounts[ion] || 0) + 1; });

      Object.keys(ionCounts).sort().forEach(ion => {
          exportGroup.append("circle").attr("cx", legX + 7).attr("cy", curY - 5).attr("r", 7).attr("fill", getIonColor(ion)).attr("stroke", "rgba(0,0,0,0.15)");
          exportGroup.append("text").attr("x", legX + 24).attr("y", curY).text(`${ion} (${ionCounts[ion]})`).attr("font-size", "13px").attr("font-family", "inherit").attr("fill", "#0f172a");
          curY += 24;
      });

      const svgString = getSVGString(svgEl);

      if(format === 'svg') {
          const blob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a"); link.href = url; link.download = "Sunburst_Publication.svg";
          document.body.appendChild(link); link.click(); document.body.removeChild(link);
      } else {
          const scale = 4; const canvas = document.createElement("canvas"); canvas.width = exportW * scale; canvas.height = exportH * scale; const ctx = canvas.getContext("2d");
          const img = new Image(); const svgBlob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"}); const url = URL.createObjectURL(svgBlob);

          await new Promise(resolve => {
              img.onload = () => {
                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height); URL.revokeObjectURL(url);
                  const link = document.createElement("a"); link.download = "Sunburst_HighRes.png"; link.href = canvas.toDataURL("image/png");
                  document.body.appendChild(link); link.click(); document.body.removeChild(link); resolve();
              }; img.src = url;
          });
      }

      d3Svg.select("#export-elements").remove(); d3Svg.select("#export-bg").remove(); d3Svg.attr("viewBox", currentViewBox.join(" "));
  }
