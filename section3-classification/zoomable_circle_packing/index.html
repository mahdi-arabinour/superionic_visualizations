<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Circle Packing — Ion Type + Count</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #475569;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-lg: 12px;
            --radius-md: 8px;
            --transition-speed: 0.2s;
        }

        html, body { 
            height: 100%; margin: 0; 
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-body); color: var(--text-main);
            display: flex; flex-direction: column;
        }

        header {
            padding: 12px 20px; background: var(--bg-card);
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color); box-shadow: var(--shadow-sm); z-index: 10;
        }
        
        header strong { font-size: 1.1rem; letter-spacing: -0.02em; padding-right: 10px; }
        .crumbs { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; }
        .crumbs a { color: #0ea5e9; text-decoration: none; cursor: pointer; font-weight: 500; }
        .crumbs a:hover { text-decoration: underline; color: #0284c7; }
        .crumbs .sep { opacity: 0.5; margin: 0 8px; font-size: 12px; }

        #wrap { flex: 1; display: flex; padding: 16px; gap: 16px; min-height: 0; }
        #chartCard {
            flex: 1; display: grid; grid-template-columns: minmax(640px, 1.7fr) 280px;
            gap: 16px; align-items: start; min-height: 0;
        }

        .card-panel {
            background: var(--bg-card); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md); border: 1px solid var(--border-color);
        }

        .chartBody {
            position: relative; height: min(88vh, 900px); min-height: 560px; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        svg { width: 100%; height: 100%; display: block; outline: none; }

        text.struct-label {
            fill: #0f172a; pointer-events: none; text-anchor: middle;
            dominant-baseline: middle; font-weight: 700;
            paint-order: stroke; stroke: #ffffff; stroke-width: 3.5px;
            stroke-linejoin: round;
        }

        text.leaf-label {
            fill: #0f172a; pointer-events: none; text-anchor: middle;
            dominant-baseline: middle; font-weight: 700; opacity: 0.95;
            paint-order: stroke; stroke: #ffffff; stroke-width: 3px;
            stroke-linejoin: round;
        }

        .legend {
            padding: 20px; overflow: auto; max-height: calc(100vh - 100px);
            display: flex; flex-direction: column; gap: 24px;
        }
        
        .legend-box h4 { 
            margin: 0 0 12px 0; font-size: 12px; color: var(--text-muted); 
            letter-spacing: 0.5px; text-transform: uppercase; font-weight: 700;
            border-bottom: 1px solid var(--border-color); padding-bottom: 6px;
        }

        .legend-item {
            display: flex; align-items: center; margin-bottom: 8px;
            font-size: 13px; font-weight: 500; color: var(--text-main);
        }

        .legend-color {
            width: 14px; height: 14px; border-radius: 4px; 
            margin-right: 10px; border: 1px solid rgba(0,0,0,0.15);
        }

        .btn {
            background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 8px 12px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer;
        }
        
        .btn-primary { background: #007aff; color: #fff; border: none; margin-left: auto;}
        .btn-primary:hover { background: #0062cc; color: #fff; transform: translateY(-1px); }
        .btn-success { background: #10b981; color: #fff; border: none; }
        .btn-success:hover { background: #059669; color: #fff; transform: translateY(-1px); }
        .btn-success-dark { background: #047857; color: #fff; border: none; }
        .btn-success-dark:hover { background: #065f46; color: #fff; transform: translateY(-1px); }
        .btn-success-ultra { background: #064e3b; color: #fff; border: none; }
        .btn-success-ultra:hover { background: #022c22; color: #fff; transform: translateY(-1px); }
    </style>
</head>
<body>
    <header>
        <strong>Circle Packing Visualizer</strong>
        <span id="trail" class="crumbs"></span>
        
        <button onclick="exportChart('svg')" class="btn btn-primary" title="Preferred for journals (Infinite Resolution Vector)">⬇ SVG</button>
        <button onclick="exportChart('png', 4)" class="btn btn-success" title="Standard Print Quality (~380 DPI)">⬇ 300 DPI</button>
        <button onclick="exportChart('png', 8)" class="btn btn-success-dark" title="Professional journal quality (~760 DPI)">⬇ 600 DPI</button>
        <button onclick="exportChart('png', 12.5)" class="btn btn-success-ultra" title="Ultra resolution (~1200 DPI)">⬇ 1200 DPI</button>
    </header>

    <div id="wrap">
        <div id="chartCard">
            <div id="chart" class="chartBody card-panel"></div>

            <div class="legend card-panel">
                <div id="struct-legend" class="legend-box"></div>
                <div id="ion-legend" class="legend-box"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
        const ION_COLORS = {
            "Li+": "#ff5252", "Na+": "#81d4fa", "K+": "#004d40", "Ag+": "#f48fb1",
            "O2-": "#6d4c41", "Zn2+": "#c2185b", "H+": "#ffd54f", "Rb+": "#43a047",
            "F-": "#ff8a65", "Cu+": "#5c6bc0", "Mg2+": "#26c6da", "In3+": "#c0ca33",
            "I-": "#ec407a", "Sn4+": "#7e57c2"
        };
        const STRUCT_COLORS = {
            "Others": "#9e9e9e", "Polymeric": "#ff7043", "Argyrodite": "#ab47bc", "Halide": "#26a69a",
            "Amorphous": "#f6bf26", "NASICON": "#66bb6a", "Anti-perovskite": "#0d47a1", "Spinel": "#8d6e63"
        };
        const getIonColor = ion => ION_COLORS[ion] || "#cbd5e1";
        const getStructColor = group => STRUCT_COLORS[group] || "#e2e8f0";

        document.addEventListener('DOMContentLoaded', () => {
            d3.csv("data.csv").then(raw => {
                raw = raw.filter(d => d["Structure Group"] && d["Ion Type"])
                    .map(d => ({
                        group: String(d["Structure Group"]).trim(),
                        ion: String(d["Ion Type"]).trim()
                    }));

                const grouped = d3.group(raw, d => d.group);
                const rootData = {
                    name: "All Structures",
                    children: Array.from(grouped, ([group, rows]) => ({
                        name: group,
                        children: Array.from(
                            d3.rollup(rows, v => v.length, d => d.ion),
                            ([ion, count]) => ({ name: ion, value: count })
                        )
                    }))
                };

                draw(rootData);
                renderLegends();
            }).catch(err => {
                document.getElementById('chart').innerHTML = `
                    <div style="padding: 30px; color: #dc2626; text-align: center;">
                        <h2>⚠️ Error Loading Data</h2>
                        <p>Could not load data.csv. Please ensure you are running this via a Local Web Server.</p>
                    </div>`;
            });
        });

        function renderLegends() {
            const structLegend = d3.select("#struct-legend");
            structLegend.html("<h4>Structure Group (Outer Circle)</h4>");
            Object.entries(STRUCT_COLORS).forEach(([name, color]) => {
                structLegend.append("div").attr("class", "legend-item")
                    .html(`<div class="legend-color" style="background:${color}"></div>${name}`);
            });

            const ionLegend = d3.select("#ion-legend");
            ionLegend.html("<h4>Ion Type (Inner Circle)</h4>");
            Object.entries(ION_COLORS).forEach(([name, color]) => {
                ionLegend.append("div").attr("class", "legend-item")
                    .html(`<div class="legend-color" style="background:${color}"></div>${name}`);
            });
        }

        function draw(data) {
            const container = document.getElementById('chart');
            const rect = container.getBoundingClientRect();
            const size = Math.min(rect.width, rect.height) * 0.95;

            // FIX: Added generous padding to create a physical gap for labels so they never overlap inner circles
            const pack = d3.pack().size([size, size]).padding(14);
            const root = pack(d3.hierarchy(data).sum(d => d.value || 0).sort((a, b) => (b.value || 0) - (a.value || 0)));

            let focus = root, view;

            const svg = d3.select("#chart").append("svg")
                .attr("viewBox", `${-size / 2} ${-size / 2} ${size} ${size}`)
                .style("cursor", "pointer")
                .on("click", (event) => zoom(event, root));

            const g = svg.append("g");
            const nodes = root.descendants();

            const circles = g.selectAll("circle")
                .data(nodes).join("circle")
                .attr("fill", d => d.depth === 0 ? "#f8fafc" : (d.children ? getStructColor(d.data.name) : getIonColor(d.data.name)))
                .attr("stroke", d => d.depth === 0 ? "#cbd5e1" : "rgba(0,0,0,0.15)")
                .attr("stroke-width", d => d.depth === 0 ? 2 : (d.children ? 1.5 : 1))
                .style("pointer-events", d => d.depth === 0 ? "none" : null)
                .on("click", (event, d) => focus !== d ? (zoom(event, d), event.stopPropagation()) : null);

            const structLabels = g.selectAll("text.struct-label")
                .data(nodes.filter(d => d.children && d.depth > 0)).join("text")
                .attr("class", "struct-label");

            const leafLabels = g.selectAll("text.leaf-label")
                .data(nodes.filter(d => !d.children && d.depth > 0)).join("text")
                .attr("class", "leaf-label");

            zoomTo([root.x, root.y, root.r * 2]);
            updateTrail(root);

            function zoomTo(v) {
                const k = size / v[2];
                view = v;

                circles.attr("transform", d => `translate(${(d.x - v[0]) * k},${(d.y - v[1]) * k})`).attr("r", d => d.r * k);

                // FIX: Structure Group Labels logic to prevent horizontal spilling and vertical overlapping
                structLabels
                    .style("display", d => (d.parent === focus ? "inline" : "none"))
                    .text(d => d.data.name)
                    .style("font-size", function(d) {
                        const r = d.r * k;
                        const textStr = d3.select(this).text();
                        const chars = textStr.length || 1;
                        
                        // Dynamically calculate width limits so long words never spill over the borders
                        const maxFsByWidth = (1.4 * r) / (chars * 0.6); 
                        const maxFsByHeight = Math.max(10, r / 4.5);
                        
                        return `${Math.max(10, Math.min(26, Math.min(maxFsByHeight, maxFsByWidth)))}px`;
                    })
                    .attr("transform", function(d) {
                        // Place safely in the top gap created by the d3 padding constraint
                        return `translate(${(d.x - v[0]) * k},${(d.y - v[1]) * k - d.r * k * 0.72})`;
                    });

                // FIX: Inner circle (Ion) Labels
                leafLabels
                    .attr("transform", d => `translate(${(d.x - v[0]) * k},${(d.y - v[1]) * k})`)
                    .style("display", "inline")
                    .text(d => {
                        const r = d.r * k;
                        // Drop the count value only if the circle is extremely small and we aren't zoomed in
                        if (r < 25 && focus !== d.parent && focus !== d) return d.data.name;
                        return `${d.data.name} (${d.value})`;
                    })
                    .style("font-size", function(d) {
                        const r = d.r * k;
                        const textStr = d3.select(this).text();
                        const chars = textStr.length || 1;
                        
                        // Constraint math to force the text to perfectly fit the circle boundary
                        const maxFsByWidth = (1.8 * r) / (chars * 0.6);
                        const maxFsByHeight = r / 2.5;
                        
                        // Font will shrink infinitely, ensuring all labels are visible without spilling
                        return `${Math.max(6, Math.min(maxFsByHeight, maxFsByWidth))}px`;
                    });
            }

            function zoom(event, d) {
                focus = d;
                const t = svg.transition().duration(750).tween("zoom", () => {
                    const i = d3.interpolateZoom(view, [focus.x, focus.y, focus.r * 2.1]);
                    return t => zoomTo(i(t));
                });
                updateTrail(d);
            }

            function updateTrail(d) {
                const trail = document.getElementById('trail');
                const ancestors = d.ancestors().reverse();
                trail.innerHTML = ancestors.length ? ancestors.map((a, i) =>
                    i === ancestors.length - 1
                        ? `<strong>${a.data.name}</strong>`
                        : `<a data-depth="${i}">${a.data.name}</a>`
                ).join('<span class="sep">›</span>') : "";

                [...trail.querySelectorAll('a')].forEach(a => {
                    a.addEventListener('click', () => {
                        const target = ancestors[+a.getAttribute('data-depth')];
                        if (target) zoom(null, target);
                    });
                });
            }

            window.addEventListener('resize', () => {
                const s = Math.min(container.getBoundingClientRect().width, container.getBoundingClientRect().height) * 0.95;
                svg.attr("viewBox", `${-s / 2} ${-s / 2} ${s} ${s}`);
                zoomTo([focus.x, focus.y, focus.r * 2.1]);
            });
        }

        // ============================================================================
        // NATIVE D3 EXPORT PIPELINE 
        // ============================================================================
        function getSVGString(svgNode) {
            svgNode.setAttribute('xlink', 'http://www.w3.org/1999/xlink');
            let cssStyleText = "";
            for (let i = 0; i < document.styleSheets.length; i++) {
                try {
                    for (let j = 0; j < document.styleSheets[i].cssRules.length; j++) {
                        cssStyleText += document.styleSheets[i].cssRules[j].cssText;
                    }
                } catch (e) {}
            }
            const styleElement = document.createElement("style");
            styleElement.setAttribute("type", "text/css");
            styleElement.innerHTML = cssStyleText;
            const refNode = svgNode.hasChildNodes() ? svgNode.children[0] : null;
            svgNode.insertBefore(styleElement, refNode);
            
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgNode);
            svgString = svgString.replace(/(\w+)?:?xlink=/g, 'xmlns:xlink=').replace(/NS\d+:href/g, 'xlink:href');
            
            svgNode.removeChild(styleElement);
            return svgString;
        }

        async function exportChart(format, scale = 4) {
            const svgEl = document.querySelector("#chart svg");
            const d3Svg = d3.select(svgEl);

            const currentViewBox = svgEl.getAttribute("viewBox").split(" ").map(Number);
            const [origX, origY, origW, origH] = currentViewBox;

            const pad = 60; 
            const legendWidth = 260; 
            const exportMinX = origX - pad;
            const exportMinY = origY - pad;
            const exportW = origW + (pad * 2) + legendWidth;
            const exportH = origH + (pad * 2);

            d3Svg.attr("viewBox", `${exportMinX} ${exportMinY} ${exportW} ${exportH}`);

            d3Svg.insert("rect", ":first-child")
                .attr("id", "export-bg")
                .attr("x", exportMinX).attr("y", exportMinY)
                .attr("width", exportW).attr("height", exportH)
                .attr("fill", "#ffffff");

            const exportGroup = d3Svg.append("g").attr("id", "export-elements");

            exportGroup.append("text")
                .attr("x", exportMinX + 20) 
                .attr("y", exportMinY + 40) 
                .text("Structure Group → Ion Type • Area ∝ Count")
                .attr("font-size", "18px")
                .attr("font-weight", "600")
                .attr("font-family", "system-ui, -apple-system, sans-serif")
                .attr("fill", "#475569");

            const legX = origX + origW + pad - 20; 
            let curY = exportMinY + 40; 

            exportGroup.append("text").attr("x", legX).attr("y", curY).text("Structure Group (Outer)")
                .attr("font-weight", "bold").attr("font-size", "16px").attr("font-family", "system-ui, sans-serif");
            curY += 24;

            Object.entries(STRUCT_COLORS).forEach(([name, color]) => {
                exportGroup.append("rect").attr("x", legX).attr("y", curY - 12)
                    .attr("width", 14).attr("height", 14).attr("rx", 3)
                    .attr("fill", color).attr("stroke", "rgba(0,0,0,0.15)");
                exportGroup.append("text").attr("x", legX + 24).attr("y", curY).text(name)
                    .attr("font-size", "14px").attr("fill", "#0f172a").attr("font-family", "system-ui, sans-serif");
                curY += 22;
            });

            curY += 30; 

            exportGroup.append("text").attr("x", legX).attr("y", curY).text("Ion Type (Inner)")
                .attr("font-weight", "bold").attr("font-size", "16px").attr("font-family", "system-ui, sans-serif");
            curY += 24;

            Object.entries(ION_COLORS).forEach(([name, color]) => {
                exportGroup.append("rect").attr("x", legX).attr("y", curY - 12)
                    .attr("width", 14).attr("height", 14).attr("rx", 3)
                    .attr("fill", color).attr("stroke", "rgba(0,0,0,0.15)");
                exportGroup.append("text").attr("x", legX + 24).attr("y", curY).text(name)
                    .attr("font-size", "14px").attr("fill", "#0f172a").attr("font-family", "system-ui, sans-serif");
                curY += 22;
            });

            const svgString = getSVGString(svgEl);

            if (format === 'svg') {
                const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url; link.download = "CirclePacking_Publication.svg";
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            } else {
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d"); 
                
                canvas.width = exportW * scale; 
                canvas.height = exportH * scale;
                
                const img = new Image();
                const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
                const url = URL.createObjectURL(svgBlob);

                await new Promise(resolve => { 
                    img.onload = () => { 
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height); 
                        URL.revokeObjectURL(url); 
                        const link = document.createElement("a"); 
                        link.download = `CirclePacking_${Math.round(scale * 96)}DPI.png`; 
                        link.href = canvas.toDataURL("image/png"); 
                        document.body.appendChild(link); link.click(); document.body.removeChild(link); 
                        resolve(); 
                    }; 
                    img.src = url; 
                });
            }

            d3Svg.select("#export-elements").remove();
            d3Svg.select("#export-bg").remove();
            d3Svg.attr("viewBox", currentViewBox.join(" "));
        }
    </script>
</body>
</html>
