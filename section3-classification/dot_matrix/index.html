<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>σ vs Doping Type</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root { color-scheme: light; }
  body { margin:16px; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial; background:#f7f7f7; color:#0f172a; }
  h2 { margin:0 0 8px; font-size:22px; }
  .sub { margin:0 0 12px; font-size:12px; color:#475569; }
  .wrap { display:flex; align-items:flex-start; gap:16px; }
  #chartPane { flex:1 1 auto; min-width:0; }
  svg { width:100%; height:auto; background:#fff; border:1px solid #e5e7eb; border-radius:12px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .axis path, .axis line { stroke:#cbd5e1; }
  .axis text { fill:#334155; font-size:12px; }
  .rowLabel { fill:#111827; font-weight:600; font-size:12px; }
  .legendCol { flex:0 0 340px; position:sticky; top:12px; display:flex; flex-direction:column; gap:12px; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:10px 12px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .card h3 { margin:0 0 8px; font-size:13px; color:#111827; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .legend-list { display:flex; flex-direction:column; gap:4px; max-height:34vh; overflow:auto; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; padding:6px 8px; border-radius:8px; cursor:pointer; user-select:none; }
  .legend-item:hover { background:#f3f4f6; }
  .legend-item.inactive { opacity:0.45; }
  .legend-swatch { width:16px; height:16px; border-radius:4px; border:1px solid rgba(0,0,0,0.35); }
  .legend-row { display:flex; gap:8px; margin-bottom:8px; }
  .btn { border:1px solid #e5e7eb; background:#fff; border-radius:999px; padding:4px 8px; cursor:pointer; font-size:12px; color:#374151; }
  .btn:hover { background:#f3f4f6; }

  /* top control: bubble size */
  .controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:0 0 10px; }
  .ctl { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:8px 10px; font-size:12px; display:flex; align-items:center; gap:8px; }

  /* subtype checklist */
  .checklist { display:flex; flex-direction:column; gap:6px; max-height:34vh; overflow:auto; border:1px solid #e5e7eb; border-radius:10px; padding:8px; }
  .check-item { display:flex; align-items:center; gap:10px; font-size:12px; }
  .check-item input { width:14px; height:14px; }

  /* Tooltip */
  .tooltip {
    position: fixed; pointer-events: none; background:#fff;
    border:1px solid #e5e7eb; box-shadow:0 8px 16px rgba(0,0,0,.08);
    border-radius:10px; padding:8px 10px; font-size:12px; color:#111827; min-width:240px;
  }
  .trow { display:flex; justify-content:space-between; gap:12px; margin:2px 0; }
  .tlabel { color:#64748b; }
  .tval { color:#0f172a; text-align:right; }
  .ion-pill {
    display:inline-block; border-radius:999px; padding:2px 6px; font-weight:600;
    border:1px solid rgba(0,0,0,.15); font-size:11px;
  }

  @media (max-width:980px){ .wrap{flex-direction:column;} .legendCol{position:static;width:100%;} }
</style>
</head>
<body>

<h2>σ (S/cm) vs Doping Type</h2>

<div class="controls">
  <div class="ctl">
    <label for="sizeSlider"><b>Bubble size</b></label>
    <input id="sizeSlider" type="range" min="0.6" max="2.0" step="0.05" value="1.0">
    <span id="sizeVal">1.00×</span>
    <button id="sizeReset" class="btn">Reset</button>
    <button onclick="downloadSVG()" class="btn" style="margin-left:16px; background:#2563eb; color:#fff; font-weight:bold; border-color:#1d4ed8;">⬇ Journal SVG (Vector)</button>
    <button onclick="downloadPNG()" class="btn" style="background:#10b981; color:#fff; font-weight:bold; border-color:#059669;">⬇ 300DPI PNG</button>
  </div>
</div>

<div class="wrap">
  <div id="chartPane">
    <svg id="chart" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <aside class="legendCol">
    <div class="card">
      <h3>Structure Group (Color)</h3>
      <div class="legend-row">
        <button id="structSelectAll" class="btn">Select All</button>
        <button id="structClearAll"  class="btn">Clear</button>
      </div>
      <div id="structItems" class="legend-list"></div>
    </div>

    <div class="card">
      <h3>Doping Type</h3>
      <div id="subtypeList" class="checklist" role="group" aria-label="Doping subtypes"></div>
      <div class="legend-row" style="margin-top:8px;">
        <button id="subtypeAll" class="btn">Select All</button>
        <button id="subtypeClear" class="btn">Clear</button>
      </div>
    </div>
  </aside>
</div>

<script>
/* Column names */
const COL_SIGMA    = "Conductivity σ (S/cm)";
const COL_STRUCT   = "Structure Group";
const COL_DOPANT   = "Doping / and or GB Strategy";
const COL_SUBTYPE  = "Doping_Subtype";
const COL_IONTYPE  = "Ion Type";
const COL_FORMULA  = "Superionic Conductor Formula (Chemical)";
const COL_EA       = "Activation Energy Ea (eV)";

/* Structure palette (bubble colors) */
const STRUCT_COLORS = {
  "Others":"#9e9e9e","Polymeric":"#ff7043","Argyrodite":"#ab47bc","Halide":"#26a69a",
  "Amorphous":"#f6bf26","NASICON":"#66bb6a","Anti-perovskite":"#0d47a1","Spinel":"#8d6e63"
};
const structColor = s => STRUCT_COLORS[s] || "#9ca3af";

/* Ion palette (for tooltip pill only) */
const ION_COLORS = {
  "Li+":  "#ff5252","Na+":  "#81d4fa","K+":   "#004d40","Ag+":  "#f48fb1",
  "O2-":  "#6d4c41","Zn2+": "#c2185b","H+":   "#ffd54f","Rb+":  "#43a047",
  "F-":   "#ff8a65","Cu+":  "#5c6bc0","Mg2+": "#26c6da","In3+": "#c0ca33",
  "I-":   "#ec407a","Sn4+": "#7e57c2"
};
const ionColor = ion => ION_COLORS[ion] || "#6b7280";

/* Layout */
const margin = {top:36,right:20,bottom:64,left:200};
const W = 1200 - margin.left - margin.right;
const H = 760  - margin.top  - margin.bottom;

const svg = d3.select("#chart");
const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

// 5. Gridlines group (behind everything)
const gridG = g.append("g").attr("class", "grid");

const boxG = g.append("g").attr("class", "boxes"); // 3. Boxplots behind bubbles
const xAxisG = g.append("g").attr("class","axis").attr("transform",`translate(0,${H})`);
const yAxisG = g.append("g");
const dotG = g.append("g").attr("class", "dots");
const labelG = g.append("g").attr("class", "labels"); // 4. Top performer labels
const bmG = g.append("g").attr("class", "benchmark"); // 1. Benchmark line

g.append("text").attr("x", W/2).attr("y", H+44).attr("text-anchor","middle")
  .attr("fill","#111827").attr("font-size",13).text("Conductivity σ (S·cm⁻¹) — log scale");
g.append("text").attr("x",-H/2).attr("y",-margin.left+60).attr("text-anchor","middle")
  .attr("fill","#111827").attr("font-size",13).attr("transform","rotate(-90)").text("Doping Type");

const tooltip = d3.select("body").append("div").attr("class","tooltip").style("opacity",0);

/* State */
let data=[], allSubtypes=[], structures=[];
let activeStructures=new Set(), activeSubtypes=new Set();
let x, band, yCenter, rScale;
let sizeFactor=1.0;

/* Controls */
const sizeSlider = document.getElementById("sizeSlider");
const sizeVal = document.getElementById("sizeVal");
const sizeReset = document.getElementById("sizeReset");
const subtypeList = document.getElementById("subtypeList");

// NOTE: Make sure the CSV filename matches your actual file
d3.csv("data.csv").then(raw=>{
  data = raw.map(d=>({
    sigma:+d[COL_SIGMA],
    structure:(d[COL_STRUCT]||"").trim(),
    dopant:(d[COL_DOPANT]||"").trim(),
    subtype:(d[COL_SUBTYPE]||"").trim(),
    ion:(d[COL_IONTYPE]||"").trim(),
    formula:(d[COL_FORMULA]||"").trim(),
    ea:+d[COL_EA] || null
  })).filter(d=>d.sigma>0 && d.structure && d.subtype);

  allSubtypes = Array.from(new Set(data.map(d=>d.subtype))).sort();
  structures  = Array.from(new Set(data.map(d=>d.structure))).sort();
  activeStructures = new Set(structures);
  activeSubtypes   = new Set(allSubtypes);

  buildSubtypeChecklist();

  // Scales
  x = d3.scaleLog().domain(d3.extent(data,d=>d.sigma)).nice().range([0,W]);
  band = d3.scaleBand().domain(allSubtypes).range([0,H]).paddingInner(0.2);
  yCenter = s => (band(s)||0) + band.bandwidth()/2;
  
  // 2. Map Activation Energy Ea to Bubble Size
  // Lower Ea = Better = Larger Bubble. Use domain from max to min.
  const eaVals = data.map(d=>d.ea).filter(v=>v!==null);
  const eaMax = d3.max(eaVals) || 1.0;
  const eaMin = d3.min(eaVals) || 0.1;
  rScale = d3.scaleLinear().domain([eaMax, eaMin]).range([3, 11]).clamp(true);

  // Axes and Grid
  xAxisG.call(d3.axisBottom(x).ticks(10,"~g"));
  gridG.call(d3.axisBottom(x).ticks(10).tickSize(H).tickFormat(""))
       .selectAll("line").attr("stroke", "#e2e8f0").attr("stroke-dasharray", "2 2");
  gridG.selectAll(".domain").remove();

  // 1. Benchmark Line (Commercial Target)
  const bX = x(1e-3);
  bmG.append("line").attr("x1", bX).attr("x2", bX).attr("y1", -20).attr("y2", H)
    .attr("stroke", "#ef4444").attr("stroke-width", 1.5).attr("stroke-dasharray", "5 5");
  bmG.append("text").attr("x", bX + 6).attr("y", -8).attr("fill", "#ef4444")
    .attr("font-size", 12).attr("font-weight", "bold").attr("font-family", "ui-sans-serif, system-ui")
    .text("10⁻³ S/cm (Target)");

  buildStructureLegend();
  wireSizeControl();

  draw();
}).catch(()=>{
  d3.select("#chartPane").append("div")
    .style("margin","12px 8px").style("color","#b91c1c")
    .text("⚠️ Could not load CSV. Please open via a local web server.");
});

function draw(){
  const rows = data.filter(d=>activeStructures.has(d.structure) && activeSubtypes.has(d.subtype));

  const visibleSubtypes = Array.from(activeSubtypes);
  band.domain(visibleSubtypes);
  yAxisG.selectAll(".rowLabel")
    .data(visibleSubtypes, d=>d)
    .join(
      enter=>enter.append("text").attr("class","rowLabel")
        .attr("x",-12).attr("y",s=>yCenter(s)).attr("dy",5)
        .attr("text-anchor","end").text(s=>s),
      update=>update.attr("y",s=>yCenter(s)),
      exit=>exit.remove()
    );

  const jitterY=10;
  const all=[];
  const boxData=[];
  const bySubtype=d3.group(rows,d=>d.subtype);
  
  for(const [subtype,arr] of bySubtype.entries()){
    const y0=yCenter(subtype);
    
    // 3. Prepare Box Plot Data
    const sigmas = arr.map(d=>d.sigma).sort(d3.ascending);
    if(sigmas.length >= 3) {
      boxData.push({
        subtype: subtype,
        y0: y0,
        min: d3.min(sigmas),
        max: d3.max(sigmas),
        q1: d3.quantile(sigmas, 0.25),
        med: d3.quantile(sigmas, 0.50),
        q3: d3.quantile(sigmas, 0.75)
      });
    }

    const nodes=arr.map(d=>({
      ...d,
      targetX:x(d.sigma), targetY:y0,
      x:x(d.sigma)+(Math.random()*2-1)*2,
      y:y0+(Math.random()*2-1)*jitterY,
      r:(d.ea ? rScale(d.ea) : 4) * sizeFactor
    }));
    const sim=d3.forceSimulation(nodes)
      .force("x", d3.forceX(n=>n.targetX).strength(0.6))
      .force("y", d3.forceY(n=>n.targetY).strength(0.15))
      .force("collide", d3.forceCollide(n=>n.r+0.8))
      .stop();
    for(let i=0;i<120;i++) sim.tick();
    all.push(...nodes);
  }

  // Draw Box Plots
  const boxH = band.bandwidth() * 0.4;
  const boxes = boxG.selectAll(".bplot").data(boxData, d=>d.subtype)
    .join("g").attr("class","bplot").attr("transform", d=>`translate(0,${d.y0})`);
  
  boxes.selectAll("*").remove(); // reset
  boxes.append("line").attr("x1", d=>x(d.min)).attr("x2", d=>x(d.max)).attr("y1", 0).attr("y2", 0)
    .attr("stroke", "#94a3b8").attr("stroke-width", 1);
  boxes.append("rect").attr("x", d=>x(d.q1)).attr("width", d=>x(d.q3)-x(d.q1))
    .attr("y", -boxH/2).attr("height", boxH)
    .attr("fill", "#e2e8f0").attr("opacity", 0.5).attr("stroke", "#64748b");
  boxes.append("line").attr("x1", d=>x(d.med)).attr("x2", d=>x(d.med)).attr("y1", -boxH/2).attr("y2", boxH/2)
    .attr("stroke", "#475569").attr("stroke-width", 2);

  // Draw Bubbles
  dotG.selectAll("circle.dot")
    .data(all, d=>d.structure+"_"+d.subtype+"_"+d.dopant+"_"+d.sigma)
    .join(
      enter=>enter.append("circle").attr("class","dot")
        .attr("r",d=>d.r).attr("cx",d=>d.x).attr("cy",d=>d.y)
        .attr("fill",d=>structColor(d.structure))
        .attr("stroke","rgba(17,24,39,0.85)").attr("stroke-width",0.7)
        .attr("opacity",0.92)
        .on("mouseover",(event,d)=>{
          tooltip.style("opacity",1).html(buildTooltipHTML(d, ionColor(d.ion)));
        })
        .on("mousemove",(event)=>tooltip.style("left",(event.clientX+14)+"px").style("top",(event.clientY+14)+"px"))
        .on("mouseout",()=>tooltip.style("opacity",0)),
      update=>update.attr("r",d=>d.r).attr("cx",d=>d.x).attr("cy",d=>d.y),
      exit=>exit.remove()
    );

  // 4. Smart Annotations for "Top Performers" (Now with Anti-Overlap physics)
  const topRows = rows.filter(d=>d.formula && d.formula !== "—").sort((a,b)=>b.sigma - a.sigma);
  const seenF = new Set();
  const topN = [];
  for(let r of topRows){
    if(!seenF.has(r.formula)){
      seenF.add(r.formula);
      topN.push(r);
      if(topN.length >= 4) break; // keep top 4
    }
  }
  
  const topNodes = all.filter(n => topN.some(tr => tr.formula === n.formula && tr.sigma === n.sigma));
  
  // Create a static simulation just for the labels to push them apart
  const labelData = topNodes.map(d => ({
      id: d.formula,
      tx: d.x,
      ty: d.y,
      x: d.x + 35, // starting guess (pushed out to the right)
      y: d.y - 35, // starting guess (pushed up)
      formula: d.formula
  }));

  // D3 force simulation to resolve overlaps
  const labelSim = d3.forceSimulation(labelData)
      // High collision radius to account for long text boxes
      .force("collide", d3.forceCollide().radius(22).iterations(3)) 
      // Gentle pull towards their anchor points
      .force("y", d3.forceY(d => d.ty - 40).strength(0.3)) 
      .force("x", d3.forceX(d => d.tx + 40).strength(0.3))
      .stop();

  // Fast-forward the simulation so it applies instantly before drawing
  for (let i = 0; i < 200; i++) labelSim.tick();

  labelG.selectAll(".top-label").data(labelData, d=>d.id)
    .join(
      enter => {
        const gLabel = enter.append("g").attr("class", "top-label");
        gLabel.append("line")
          .attr("stroke", "#475569").attr("stroke-width", 1).attr("opacity", 0.7);
        gLabel.append("text")
          .attr("fill", "#0f172a").attr("font-size", 11).attr("font-weight", "600")
          .attr("font-family", "ui-monospace, monospace");
        return gLabel;
      },
      update => update,
      exit => exit.remove()
    )
    .each(function(d) {
      const sel = d3.select(this);
      // Draw connector line from the bubble (tx, ty) to the resolved label position (x, y)
      sel.select("line")
         .attr("x1", d.tx).attr("y1", d.ty)
         .attr("x2", d.x).attr("y2", d.y);
      // Place the text slightly offset from the end of the line
      sel.select("text")
         .attr("x", d.x + 4).attr("y", d.y + 4)
         .text(d.formula);
    });
}

/* Structure legend (click to filter) */
function buildStructureLegend(){
  const container=d3.select("#structItems");
  container.selectAll("*").remove();
  structures.forEach(name=>{
    const item=container.append("div").attr("class","legend-item");
    item.on("click",(ev)=>{
      const solo=activeStructures.size===1&&activeStructures.has(name);
      if(ev.metaKey||ev.ctrlKey){
        activeStructures.has(name)?activeStructures.delete(name):activeStructures.add(name);
      }else if(ev.shiftKey){
        activeStructures.add(name);
      }else{
        activeStructures = solo ? new Set(structures) : new Set([name]);
      }
      refreshStructLegend(); draw();
    });
    item.append("div").attr("class","legend-swatch").style("background",structColor(name));
    item.append("span").text(name);
  });
  d3.select("#structSelectAll").on("click",()=>{activeStructures=new Set(structures);refreshStructLegend();draw();});
  d3.select("#structClearAll").on("click",()=>{activeStructures=new Set();refreshStructLegend();draw();});
  refreshStructLegend();
}
function refreshStructLegend(){
  d3.selectAll("#structItems .legend-item").classed("inactive",function(){
    const name=d3.select(this).select("span").text();
    return !activeStructures.has(name);
  });
}

/* Subtype checklist */
function buildSubtypeChecklist(){
  subtypeList.innerHTML = "";
  for(const s of allSubtypes){
    const id = "chk_"+s.replace(/\W+/g,"_");
    const row = document.createElement("label");
    row.className = "check-item";
    row.htmlFor = id;
    row.innerHTML = `<input type="checkbox" id="${id}" value="${s}" checked><span>${s}</span>`;
    subtypeList.appendChild(row);
  }

  subtypeList.addEventListener("change", (e)=>{
    const el = e.target;
    if (el && el.type === "checkbox") {
      const val = el.value;
      if (el.checked) activeSubtypes.add(val);
      else activeSubtypes.delete(val);
      draw();
    }
  });

  document.getElementById("subtypeAll").addEventListener("click", ()=>{
    activeSubtypes = new Set(allSubtypes);
    for (const cb of subtypeList.querySelectorAll('input[type="checkbox"]')) cb.checked = true;
    draw();
  });
  document.getElementById("subtypeClear").addEventListener("click", ()=>{
    activeSubtypes = new Set();
    for (const cb of subtypeList.querySelectorAll('input[type="checkbox"]')) cb.checked = false;
    draw();
  });
}

/* Bubble size control */
function wireSizeControl(){
  sizeSlider.addEventListener("input", ()=>{
    sizeFactor = +sizeSlider.value;
    sizeVal.textContent = `${sizeFactor.toFixed(2)}×`;
    draw();
  });
  sizeReset.addEventListener("click", ()=>{
    sizeFactor=1.0; sizeSlider.value="1.0"; sizeVal.textContent="1.00×"; draw();
  });
}

/* Tooltip builder */
function buildTooltipHTML(d, ionCol){
  const sigma = formatSig(d.sigma) + " S/cm";
  const eaStr = d.ea ? d.ea.toFixed(3) + " eV" : "—";
  const ionHTML = d.ion
    ? `<span class="ion-pill" style="background:${ionCol}22;color:${bestText(ionCol)}">${escapeHTML(d.ion)}</span>`
    : "—";
  const formulaHTML = d.formula ? `<code style="font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px;">${escapeHTML(d.formula)}</code>` : "—";

  return `
    <div class="trow"><span class="tlabel">σ</span><span class="tval">${sigma}</span></div>
    <div class="trow"><span class="tlabel">Activation Energy E_a</span><span class="tval">${eaStr}</span></div>
    <div class="trow"><span class="tlabel">Structure</span><span class="tval">${escapeHTML(d.structure)}</span></div>
    <div class="trow"><span class="tlabel">Doping Type</span><span class="tval">${escapeHTML(d.subtype)}</span></div>
    <div class="trow"><span class="tlabel">Ion Type</span><span class="tval">${ionHTML}</span></div>
    <div class="trow"><span class="tlabel">Formula</span><span class="tval">${formulaHTML}</span></div>
  `;
}

/* Helpers */
function formatSig(v){
  if (!Number.isFinite(v)) return "–";
  const e = Math.log10(v);
  return (e >= -2 && e <= 3) ? v.toPrecision(3) : `1e${e.toFixed(1)}`;
}
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function bestText(hex){
  try{
    const c = d3.color(hex);
    if(!c) return "#111";
    const [r,g,b] = [c.r,c.g,c.b].map(v=>v/255);
    const L = 0.2126*r + 0.7152*g + 0.0722*b;
    return L > 0.55 ? "#111" : "#fff";
  }catch{ return "#111"; }
}

// ---- Universal High-Quality Export Script ----
function prepareSVGForExport(svgNode) {
  const clone = svgNode.cloneNode(true);
  
  const styleEl = document.createElement('style');
  styleEl.textContent = `
    .axis path, .axis line { stroke:#cbd5e1; }
    .axis text { fill:#334155; font-size:12px; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .rowLabel { fill:#111827; font-weight:600; font-size:12px; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
  `;
  clone.prepend(styleEl);

  const baseWidth = 1200;
  const baseHeight = 760;

  const titleEl = document.querySelector('h1, h2, h3');
  const titleText = titleEl ? titleEl.innerText : "Data Chart";
  
  const titleOffset = 60;  
  const legendWidth = 220; // increased slightly for size legend
  
  const totalWidth = baseWidth + legendWidth;
  const totalHeight = baseHeight + titleOffset;

  clone.setAttribute("viewBox", `0 -${titleOffset} ${totalWidth} ${totalHeight}`);
  clone.setAttribute("width", totalWidth);
  clone.setAttribute("height", totalHeight);

  const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  bg.setAttribute("x", 0);
  bg.setAttribute("y", -titleOffset);
  bg.setAttribute("width", totalWidth);
  bg.setAttribute("height", totalHeight);
  bg.setAttribute("fill", "#ffffff");
  clone.prepend(bg);

  const tTitle = document.createElementNS("http://www.w3.org/2000/svg", "text");
  tTitle.textContent = titleText;
  tTitle.setAttribute("x", baseWidth / 2);
  tTitle.setAttribute("y", -20);
  tTitle.setAttribute("text-anchor", "middle");
  tTitle.setAttribute("fill", "#111827");
  tTitle.setAttribute("font-size", "24px");
  tTitle.setAttribute("font-weight", "bold");
  tTitle.setAttribute("font-family", 'ui-sans-serif, system-ui, -apple-system, sans-serif');
  clone.appendChild(tTitle);

  const lg = document.createElementNS("http://www.w3.org/2000/svg", "g");
  lg.setAttribute("transform", `translate(${baseWidth}, 36)`);
  
  let yPos = 0;
  const tLegTitle = document.createElementNS("http://www.w3.org/2000/svg", "text");
  tLegTitle.textContent = "Structure Group";
  tLegTitle.setAttribute("x", 10);
  tLegTitle.setAttribute("y", yPos);
  tLegTitle.setAttribute("fill", "#111827");
  tLegTitle.setAttribute("font-size", "14px");
  tLegTitle.setAttribute("font-weight", "bold");
  tLegTitle.setAttribute("font-family", 'ui-sans-serif, system-ui, -apple-system, sans-serif');
  lg.appendChild(tLegTitle);
  yPos += 24;

  if (typeof structures !== 'undefined' && typeof activeStructures !== 'undefined') {
    structures.forEach(name => {
      if (activeStructures.has(name)) {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", 16);
        c.setAttribute("cy", yPos - 4);
        c.setAttribute("r", 6);
        c.setAttribute("fill", structColor(name));
        c.setAttribute("stroke", "rgba(17,24,39,0.85)");
        c.setAttribute("stroke-width", 0.6);
        lg.appendChild(c);
        
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.textContent = name;
        t.setAttribute("x", 32);
        t.setAttribute("y", yPos);
        t.setAttribute("fill", "#334155");
        t.setAttribute("font-size", "13px");
        t.setAttribute("font-family", 'ui-sans-serif, system-ui, -apple-system, sans-serif');
        lg.appendChild(t);
        yPos += 20;
      }
    });
  }
  
  yPos += 16;
  const tLegEa = document.createElementNS("http://www.w3.org/2000/svg", "text");
  tLegEa.textContent = "Bubble Size = Activation Energy (Ea)";
  tLegEa.setAttribute("x", 10);
  tLegEa.setAttribute("y", yPos);
  tLegEa.setAttribute("fill", "#111827");
  tLegEa.setAttribute("font-size", "12px");
  tLegEa.setAttribute("font-family", 'ui-sans-serif, system-ui, -apple-system, sans-serif');
  tLegEa.setAttribute("font-style", "italic");
  lg.appendChild(tLegEa);
  yPos += 20;
  
  const tLegEa2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
  tLegEa2.textContent = "Larger Bubble = Lower Ea (Better)";
  tLegEa2.setAttribute("x", 10);
  tLegEa2.setAttribute("y", yPos);
  tLegEa2.setAttribute("fill", "#111827");
  tLegEa2.setAttribute("font-size", "11px");
  tLegEa2.setAttribute("font-family", 'ui-sans-serif, system-ui, -apple-system, sans-serif');
  lg.appendChild(tLegEa2);

  clone.appendChild(lg);

  return { clone, totalWidth, totalHeight };
}

function downloadSVG() {
  const svgNode = document.getElementById('chart');
  const { clone } = prepareSVGForExport(svgNode);
  
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const serializer = new XMLSerializer();
  let source = serializer.serializeToString(clone);
  
  if(!source.match(/^<\?xml/)) {
      source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
  }

  const blob = new Blob([source], {type: "image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "chart_super_vector.svg";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadPNG() {
  const svgNode = document.getElementById('chart');
  const { clone, totalWidth, totalHeight } = prepareSVGForExport(svgNode);
  const scale = 4; // 300dpi equivalent
  
  clone.setAttribute("width", totalWidth * scale);
  clone.setAttribute("height", totalHeight * scale);
  
  const serializer = new XMLSerializer();
  let source = serializer.serializeToString(clone);
  
  const img = new Image();
  img.crossOrigin = "anonymous";
  const svg64 = btoa(unescape(encodeURIComponent(source)));
  img.src = 'data:image/svg+xml;base64,' + svg64;

  img.onload = function() {
    const canvas = document.createElement("canvas");
    canvas.width = totalWidth * scale;
    canvas.height = totalHeight * scale;
    const ctx = canvas.getContext("2d");
    
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    
    const pngUrl = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = pngUrl;
    a.download = "chart_super_300dpi.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
}
