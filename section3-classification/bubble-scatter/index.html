<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ea vs σ (log Y)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<style>
  :root { --bg:#ffffff; --panel:#f8f9fa; --grid:#e3e3e3; --text:#111; --panel-border:#d0d0d0; --note:#555; --accent:#007aff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }

  header {
    display:flex; flex-wrap:wrap; gap:12px; align-items:center;
    padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--panel-border);
    position:sticky; top:0; z-index:10;
  }
  label { display:flex; align-items:center; gap:6px; font-size:12px; }
  .slider-container { display:flex; align-items:center; gap:6px; font-size:12px; }
  input[type="range"] { width:160px; }
  .badge { font-size:11px; color:var(--note); margin-left:auto; }

  /* Added button styling */
  #exportBtn {
    margin-left: 20px; padding: 6px 12px; background: var(--accent); color: white; 
    border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;
    transition: background 0.2s;
  }
  #exportBtn:hover { background: #005bb5; }

  .wrap { display:grid; grid-template-columns: 1fr 320px; gap:10px; padding:10px; background: #fff; }
  #chart { width:100%; height:92vh; border:1px solid var(--grid); border-radius:10px; background:#fff; }

  aside {
    display:flex; flex-direction:column; gap:14px;
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:10px; font-size:12px; max-height:92vh; overflow:auto;
  }
  .panel { background:#fff; border:1px solid #ddd; border-radius:10px; padding:10px; }
  .panel h3 { margin:0 0 8px; font-size:13px; color:#000; display:flex; justify-content:space-between; align-items:center; }
  .panel .controls { display:flex; gap:6px; }
  .panel button {
    border:1px solid #ddd; background:#f7f7f7; border-radius:8px; padding:4px 8px; font-size:11px; cursor:pointer;
  }
  .panel button:hover { background:#efefef; }

  /* Ion legend rows (shape-only, gray) */
  #ionLegend .row, #structureLegend .row {
    display:flex; align-items:center; gap:8px; padding:6px 8px; margin:5px 0;
    border:1px solid #e3e3e3; border-radius:8px; cursor:pointer; user-select:none; background:#fff;
  }
  #ionLegend .row.active, #structureLegend .row.active { outline:2px solid var(--accent); }
  .swatch { width:14px; height:14px; border-radius:3px; border:1px solid #0002; }
  .shapeBox { width:16px; height:16px; display:inline-block; }
  .name { color:#000; font-size:12px; }
  .count { margin-left:auto; color:#555; font-size:11px; }

  #error { display:none; margin:8px 12px; padding:8px 12px; background:#fff3f3; color:#7f1d1d; border:1px solid #f5c2c2; border-radius:8px; white-space:pre-wrap; }
</style>
</head>
<body>
  <header>
    <div class="slider-container">
      <label for="sizeScale">Marker size:</label>
      <input type="range" id="sizeScale" min="6" max="36" value="16" step="1">
      <span id="scaleVal">16 px</span>
    </div>
    <button id="exportBtn">Export High-Res PNG</button>
    <span class="badge" id="status">Loading data.csv…</span>
  </header>

  <div id="error"></div>

  <div class="wrap">
    <div id="chart"></div>

    <aside>
      <div class="panel" id="ionPanel">
        <h3>
          Ion (shape, gray)
          <span class="controls">
            <button id="ionSelectAll">Select all</button>
            <button id="ionClearAll">Clear all</button>
          </span>
        </h3>
        <div id="ionLegend"></div>
      </div>

      <div class="panel" id="structPanel">
        <h3>
          Structure Group (color)
          <span class="controls">
            <button id="structSelectAll">Select all</button>
            <button id="structClearAll">Clear all</button>
          </span>
        </h3>
        <div id="structureLegend"></div>
      </div>
    </aside>
  </div>

<script>
const CONFIG = {
  colSigma: "Conductivity σ (S/cm)",
  colEa: "Activation Energy Ea (eV)",
  colStruct: "Structure Group",
  colIon: "Ion Type",
  colFormula: "Superionic Conductor Formula (Chemical)",
  colors: {
    "Others":"#9e9e9e","Polymeric":"#ff7043","Argyrodite":"#ab47bc","Halide":"#26a69a",
    "Amorphous":"#f6bf26","NASICON":"#66bb6a","Anti-perovskite":"#0d47a1","Spinel":"#8d6e63"
  }
};

let rawData = [];
let activeStructs = new Set();
let activeIons = new Set();
let ionShapeMap = {};
const shapes = ["circle", "square", "diamond", "cross", "x", "triangle-up", "star"];

window.onload = function() {
    fetch('data.csv')
        .then(response => response.text())
        .then(csvText => {
            Papa.parse(csvText, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: (results) => {
                    rawData = results.data.filter(d => d[CONFIG.colSigma] > 0 && d[CONFIG.colEa] > 0);
                    
                    const structs = [...new Set(rawData.map(d => d[CONFIG.colStruct]))].filter(Boolean).sort();
                    const ions = [...new Set(rawData.map(d => d[CONFIG.colIon]))].filter(Boolean).sort();
                    
                    activeStructs = new Set(structs);
                    activeIons = new Set(ions);
                    
                    ions.forEach((ion, i) => { ionShapeMap[ion] = shapes[i % shapes.length]; });

                    renderLegends(structs, ions);
                    updateChart();
                }
            });
        })
        .catch(err => {
            document.getElementById('chart').innerHTML = `<div style="padding:20px; color:#b91c1c;">⚠️ Error loading data.csv. Make sure the file is in the same folder and you are using a local server.</div>`;
        });
};

function renderLegends(structs, ions) {
  const sCont = document.getElementById('structLegend');
  sCont.innerHTML = "";
  structs.forEach(s => {
    const div = document.createElement('div');
    div.className = 'row active';
    div.innerHTML = `<div class="swatch" style="background:${CONFIG.colors[s] || '#94a3b8'}"></div><span>${s}</span>`;
    div.onclick = () => {
      div.classList.toggle('active');
      activeStructs.has(s) ? activeStructs.delete(s) : activeStructs.add(s);
      updateChart();
    };
    sCont.appendChild(div);
  });

  const iCont = document.getElementById('ionLegend');
  iCont.innerHTML = "";
  ions.forEach(ion => {
    const div = document.createElement('div');
    div.className = 'row active';
    div.innerHTML = `<div class="shape-preview">◈</div><span>${ion}</span>`;
    div.onclick = () => {
      div.classList.toggle('active');
      activeIons.has(ion) ? activeIons.delete(ion) : activeIons.add(ion);
      updateChart();
    };
    iCont.appendChild(div);
  });
}

function updateChart() {
  if (rawData.length === 0) return;
  const filtered = rawData.filter(d => activeStructs.has(d[CONFIG.colStruct]) && activeIons.has(d[CONFIG.colIon]));
  const markerSize = document.getElementById('sizeScale').value;

  const traces = [];
  const groups = d3.groups(filtered, d => d[CONFIG.colStruct], d => d[CONFIG.colIon]);

  groups.forEach(([structName, ionGroups]) => {
    ionGroups.forEach(([ionName, data]) => {
      traces.push({
        x: data.map(d => d[CONFIG.colEa]),
        y: data.map(d => d[CONFIG.colSigma]),
        text: data.map(d => d[CONFIG.colFormula]),
        mode: 'markers',
        name: `${structName} (${ionName})`,
        marker: {
          size: markerSize,
          symbol: ionShapeMap[ionName],
          color: CONFIG.colors[structName] || '#94a3b8',
          line: { width: 1, color: '#fff' },
          opacity: 0.8
        },
        hovertemplate: `<b>%{text}</b><br>Ea: %{x} eV<br>σ: %{y} S/cm<extra></extra>`
      });
    });
  });

  const layout = {
    xaxis: { 
      title: { text: 'Activation Energy Eₐ (eV)', font: { size: 14, family: 'Arial, sans-serif' } }, 
      range: [0, 1.2], gridcolor: '#f1f5f9', zeroline: false, tickfont: {size: 12}
    },
    yaxis: { 
      title: { text: 'Ionic Conductivity σ (S/cm)', font: { size: 14, family: 'Arial, sans-serif' } }, 
      type: 'log', gridcolor: '#f1f5f9', zeroline: false, tickfont: {size: 12}
    },
    margin: { t: 30, r: 30, b: 60, l: 80 },
    hovermode: 'closest',
    showlegend: false,
    plot_bgcolor: '#ffffff',
    paper_bgcolor: '#ffffff',
    shapes: [{
      type: 'line', x0: 0.05, y0: 5, x1: 1.1, y1: 1e-10,
      line: { color: '#cbd5e1', width: 2, dash: 'dash' }
    }]
  };

  Plotly.newPlot('chart', traces, layout, { responsive: true, displayModeBar: false });
}

function downloadPNG() {
  Plotly.downloadImage('chart', { 
    format: 'png', 
    width: 1200, 
    height: 800, 
    filename: 'Ea_vs_Sigma_300DPI',
    imageDataOnly: false
  });
}

function downloadSVG() {
  Plotly.downloadImage('chart', { 
    format: 'svg', 
    width: 1200, 
    height: 800, 
    filename: 'Ea_vs_Sigma_Vector'
  });
}

document.getElementById('sizeScale').oninput = (e) => { updateChart(); };
</script>
</body>
</html>
