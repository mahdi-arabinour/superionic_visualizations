<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ea vs σ - Journal Quality</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root { --bg:#ffffff; --text:#0f172a; --accent:#2563eb; }
  body { margin:0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; gap:12px; align-items:center; padding:12px 20px; background:#f8fafc; border-bottom:1px solid #e2e8f0; position:sticky; top:0; z-index:10; }
  .btn { border:1px solid #e2e8f0; background:#fff; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px; font-weight:600; color:#374151; transition:0.2s; }
  .btn:hover { background:#f1f5f9; }
  .btn-primary { background: #2563eb; color: #fff; border-color: #1d4ed8; }
  .wrap { display:grid; grid-template-columns: 1fr 300px; gap:16px; padding:16px; }
  #chart { width:100%; height:82vh; border:1px solid #e2e8f0; border-radius:8px; position:relative; }
  aside { display:flex; flex-direction:column; gap:12px; }
  .card { background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  h3 { margin:0 0 8px; font-size:13px; font-weight:bold; color:#1e293b; border-bottom:1px solid #f1f5f9; padding-bottom:4px; }
  .legend-row { display:flex; align-items:center; gap:8px; font-size:12px; margin:4px 0; padding:4px; border-radius:4px; cursor:pointer; }
  .legend-row.active { background:#eff6ff; border:1px solid #bfdbfe; }
  .swatch { width:12px; height:12px; border-radius:2px; }
  #fallback-loader { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; display:none; }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:8px;">
    <label style="font-size:12px; font-weight:600;">Marker Size:</label>
    <input type="range" id="sizeScale" min="6" max="25" value="12">
  </div>
  <button id="exportPNG" class="btn btn-primary" style="margin-left:auto;">⬇ Download 300 DPI PNG</button>
  <button id="exportSVG" class="btn">⬇ Download Vector SVG</button>
</header>

<div style="padding:15px 20px 0;">
  <h2 id="mainTitle" style="margin:0; font-size:22px;">Ionic Conductivity (σ) vs. Activation Energy (Eₐ)</h2>
  <p style="margin:4px 0; font-size:12px; color:#64748b;">Dashed line: Meyer-Neldel Limit. Shaded areas show data density.</p>
</div>

<div class="wrap">
  <div id="chart">
    <div id="fallback-loader">
      <p style="font-size:13px; color:#64748b; font-style:italic;">Browser blocked auto-load.</p>
      <input type="file" id="manualFile" style="display:none;" accept=".csv">
      <button onclick="document.getElementById('manualFile').click()" class="btn btn-primary">📂 Select data.csv manually</button>
    </div>
  </div>
  <aside>
    <div class="card">
      <h3>Structure (Ranked by σ)</h3>
      <div id="structLegend"></div>
    </div>
    <div class="card">
      <h3>Ion Type</h3>
      <div id="ionLegend"></div>
    </div>
  </aside>
</div>

<script>
const CONFIG = {
  colSigma: "Conductivity σ (S/cm)",
  colEa: "Activation Energy Ea (eV)",
  colStruct: "Structure Group",
  colIon: "Ion Type",
  colFormula: "Superionic Conductor Formula (Chemical)",
  colors: { "Argyrodite":"#ab47bc", "Halide":"#26a69a", "NASICON":"#66bb6a", "Anti-perovskite":"#0d47a1", "Spinel":"#8d6e63", "Polymeric":"#ff7043", "Amorphous":"#f6bf26", "Others":"#94a3b8" }
};

let rawData = [];

// Fallback logic for local files
window.onload = () => {
  fetch('data.csv').then(r => r.text()).then(t => parse(t))
  .catch(() => { document.getElementById('fallback-loader').style.display = 'block'; });
};

document.getElementById('manualFile').onchange = (e) => {
  const reader = new FileReader();
  reader.onload = (f) => parse(f.target.result);
  reader.readAsText(e.target.files[0]);
};

function parse(csv) {
  Papa.parse(csv, { header:true, dynamicTyping:true, skipEmptyLines:true, complete: (res) => {
    rawData = res.data.filter(d => d[CONFIG.colSigma] > 0 && d[CONFIG.colEa] > 0);
    document.getElementById('fallback-loader').style.display = 'none';
    init();
  }});
}

function init() {
    const structs = [...new Set(rawData.map(d => d[CONFIG.colStruct]))].filter(Boolean);
    structs.sort((a,b) => {
        const medA = d3.median(rawData.filter(d => d[CONFIG.colStruct] === a).map(d => d[CONFIG.colSigma]));
        const medB = d3.median(rawData.filter(d => d[CONFIG.colStruct] === b).map(d => d[CONFIG.colSigma]));
        return medB - medA;
    });
    renderLegend(structs);
    draw();
}

function renderLegend(structs) {
    const cont = document.getElementById('structLegend');
    cont.innerHTML = "";
    structs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'legend-row active';
        div.innerHTML = `<div class="swatch" style="background:${CONFIG.colors[s] || '#999'}"></div><span>${s}</span>`;
        cont.appendChild(div);
    });
}

function draw() {
    const markerSize = document.getElementById('sizeScale').value;
    const traces = [];
    
    // Add Density Contour (The "High Impact" Layer)
    traces.push({
      x: rawData.map(d => d[CONFIG.colEa]),
      y: rawData.map(d => d[CONFIG.colSigma]),
      type: 'histogram2dcontour',
      colorscale: 'Blues',
      showscale: false,
      ncontours: 10,
      opacity: 0.3
    });

    const groups = d3.groups(rawData, d => d[CONFIG.colStruct]);
    groups.forEach(([name, data]) => {
        traces.push({
            x: data.map(d => d[CONFIG.colEa]),
            y: data.map(d => d[CONFIG.colSigma]),
            text: data.map(d => d[CONFIG.colFormula]),
            mode: 'markers',
            name: name,
            marker: { size: markerSize, color: CONFIG.colors[name] || '#999', line: {width: 0.5, color: '#fff'}, opacity: 0.8 },
            hovertemplate: "<b>%{text}</b><br>Ea: %{x} eV<br>σ: %{y} S/cm<extra></extra>"
        });
    });

    const layout = {
        xaxis: { title: "Activation Energy E<sub>a</sub> (eV)", range: [0, 1.2], gridcolor: "#f1f5f9", tickfont: {size: 11} },
        yaxis: { title: "Ionic Conductivity σ (S·cm⁻¹)", type: "log", gridcolor: "#f1f5f9", tickfont: {size: 11} },
        margin: { t: 20, r: 20, b: 60, l: 80 },
        showlegend: false,
        plot_bgcolor: "#fff",
        shapes: [{ type: 'line', x0: 0.1, y0: 1, x1: 1.0, y1: 1e-9, line: { color: '#cbd5e1', width: 2, dash: 'dash' } }]
    };

    Plotly.newPlot('chart', traces, layout, { responsive: true, displayModeBar: false });
}

document.getElementById('sizeScale').oninput = draw;
document.getElementById('exportPNG').onclick = () => Plotly.downloadImage('chart', {format:'png', width:1400, height:900, filename:'Scatter_Publication_Quality'});
document.getElementById('exportSVG').onclick = () => Plotly.downloadImage('chart', {format:'svg', width:1400, height:900, filename:'Scatter_Publication_Quality'});
</script>
</body>
</html>
