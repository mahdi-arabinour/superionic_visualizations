<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ea vs σ - Publication Quality</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root { --bg:#ffffff; --text:#0f172a; --accent:#2563eb; }
  body { margin:0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; gap:12px; align-items:center; padding:12px 20px; background:#f8fafc; border-bottom:1px solid #e2e8f0; sticky: top; z-index:10; }
  .btn { border:1px solid #e2e8f0; background:#fff; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px; font-weight:600; color:#374151; }
  .btn-primary { background: #2563eb; color: #fff; border-color: #1d4ed8; }
  .wrap { display:grid; grid-template-columns: 1fr 300px; gap:16px; padding:16px; }
  #chart { width:100%; height:82vh; border:1px solid #e2e8f0; border-radius:8px; }
  aside { display:flex; flex-direction:column; gap:12px; }
  .card { background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:12px; }
  h3 { margin:0 0 8px; font-size:13px; font-weight:bold; }
  .legend-row { display:flex; align-items:center; gap:8px; font-size:12px; margin:4px 0; padding:4px; border-radius:4px; cursor:pointer; }
  .legend-row.active { background:#eff6ff; border:1px solid #bfdbfe; }
  .swatch { width:12px; height:12px; border-radius:2px; }
</style>
</head>
<body>

<header>
  <button id="exportPNG" class="btn btn-primary">⬇ Download 300 DPI PNG</button>
  <button id="exportSVG" class="btn">⬇ Download Vector SVG</button>
  <div style="margin-left:auto; font-size:12px; font-weight:bold; color:#64748b;">Publication Ready Mode: ON</div>
</header>

<div style="padding:15px 20px 0;">
  <h2 id="mainTitle" style="margin:0; font-size:20px;">Ionic Conductivity ($\sigma$) vs. Activation Energy ($E_a$)</h2>
  <p style="margin:4px 0; font-size:12px; color:#64748b;">Dashed line: Theoretical Meyer-Neldel limit for superionic conductors.</p>
</div>

<div class="wrap">
  <div id="chart"></div>
  <aside>
    <div class="card">
      <h3>Structure (Sorted by Median $\sigma$)</h3>
      <div id="structLegend"></div>
    </div>
    <div class="card">
      <h3>Ion Type</h3>
      <div id="ionLegend"></div>
    </div>
  </aside>
</div>

<script>
const CONFIG = {
  colSigma: "Conductivity σ (S/cm)",
  colEa: "Activation Energy Ea (eV)",
  colStruct: "Structure Group",
  colIon: "Ion Type",
  colFormula: "Superionic Conductor Formula (Chemical)",
  colors: { "Argyrodite":"#ab47bc", "Halide":"#26a69a", "NASICON":"#66bb6a", "Anti-perovskite":"#0d47a1", "Spinel":"#8d6e63", "Polymeric":"#ff7043", "Amorphous":"#f6bf26", "Others":"#94a3b8" }
};

let rawData = [];
const shapes = ["circle", "square", "diamond", "cross", "x", "triangle-up", "star"];

window.onload = function() {
    fetch('data.csv').then(r => r.text()).then(csvText => {
        Papa.parse(csvText, { header: true, dynamicTyping: true, skipEmptyLines: true, complete: (res) => {
            rawData = res.data.filter(d => d[CONFIG.colSigma] > 0 && d[CONFIG.colEa] > 0);
            init();
        }});
    });
};

function init() {
    const structs = [...new Set(rawData.map(d => d[CONFIG.colStruct]))].filter(Boolean);
    
    // Sort Structures by Median Conductivity
    structs.sort((a,b) => {
        const medA = d3.median(rawData.filter(d => d[CONFIG.colStruct] === a).map(d => d[CONFIG.colSigma]));
        const medB = d3.median(rawData.filter(d => d[CONFIG.colStruct] === b).map(d => d[CONFIG.colSigma]));
        return medB - medA;
    });

    renderLegend(structs);
    draw();
}

function renderLegend(structs) {
    const cont = document.getElementById('structLegend');
    structs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'legend-row active';
        div.innerHTML = `<div class="swatch" style="background:${CONFIG.colors[s] || '#999'}"></div><span>${s}</span>`;
        cont.appendChild(div);
    });
}

function draw() {
    const traces = [];
    const groups = d3.groups(rawData, d => d[CONFIG.colStruct]);

    groups.forEach(([name, data]) => {
        traces.push({
            x: data.map(d => d[CONFIG.colEa]),
            y: data.map(d => d[CONFIG.colSigma]),
            text: data.map(d => d[CONFIG.colFormula]),
            mode: 'markers',
            name: name,
            marker: { size: 12, color: CONFIG.colors[name] || '#999', line: {width: 1, color: '#fff'}, opacity: 0.8 },
            hovertemplate: "<b>%{text}</b><br>Ea: %{x} eV<br>σ: %{y} S/cm<extra></extra>"
        });
    });

    const layout = {
        xaxis: { title: "Activation Energy $E_a$ (eV)", range: [0, 1.2], gridcolor: "#f1f5f9", tickfont: {size: 12} },
        yaxis: { title: "Conductivity $\sigma$ (S$\cdot$cm$^{-1}$)", type: "log", gridcolor: "#f1f5f9", tickfont: {size: 12} },
        margin: { t: 20, r: 20, b: 60, l: 80 },
        showlegend: false,
        plot_bgcolor: "#fff",
        // Theoretical Frontier Line
        shapes: [{ type: 'line', x0: 0.1, y0: 1, x1: 1.0, y1: 1e-9, line: { color: '#cbd5e1', width: 2, dash: 'dash' } }]
    };

    Plotly.newPlot('chart', traces, layout, { responsive: true, displayModeBar: false });
}

document.getElementById('exportPNG').onclick = () => Plotly.downloadImage('chart', {format:'png', width:1200, height:800, filename:'Figure_Scatter_300DPI'});
document.getElementById('exportSVG').onclick = () => Plotly.downloadImage('chart', {format:'svg', width:1200, height:800, filename:'Figure_Scatter_Vector'});
</script>
</body>
</html>
