<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ea vs σ — Publication Quality</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root { --bg:#ffffff; --panel:#f8fafc; --text:#0f172a; --accent:#2563eb; }
  body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); }

  header {
    display:flex; gap:12px; align-items:center;
    padding:12px 20px; background:var(--panel); border-bottom:1px solid #e2e8f0;
    position:sticky; top:0; z-index:10;
  }
  
  .btn { 
    border:1px solid #e2e8f0; background:#fff; border-radius:999px; 
    padding:6px 14px; cursor:pointer; font-size:12px; font-weight:600; color:#374151;
  }
  .btn:hover { background:#f1f5f9; }
  .btn-primary { background: #2563eb; color: #fff; border-color: #1d4ed8; }
  .btn-success { background: #10b981; color: #fff; border-color: #059669; }

  .wrap { display:grid; grid-template-columns: 1fr 320px; gap:16px; padding:16px; }
  #chart { width:100%; height:82vh; border:1px solid #e2e8f0; border-radius:12px; background:#fff; }

  aside { display:flex; flex-direction:column; gap:16px; max-height:82vh; overflow:auto; }
  .card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  h3 { margin:0 0 8px; font-size:13px; font-weight:700; color:#1e293b; border-bottom:1px solid #f1f5f9; padding-bottom:4px; }

  .legend-row {
    display:flex; align-items:center; gap:8px; padding:6px 10px; margin:4px 0;
    border:1px solid #f1f5f9; border-radius:8px; font-size:12px;
  }
  .swatch { width:12px; height:12px; border-radius:3px; border:1px solid rgba(0,0,0,0.1); }
  #status { font-size:11px; color:#64748b; margin-left:auto; }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:8px;">
    <label style="font-size:12px; font-weight:600;">Marker Size:</label>
    <input type="range" id="sizeScale" min="6" max="25" value="14">
  </div>
  <button onclick="downloadSVG()" class="btn btn-primary" style="margin-left: auto;">⬇ Journal SVG (Vector)</button>
  <button onclick="downloadPNG()" class="btn btn-success">⬇ 300DPI PNG</button>
  <span id="status">Loading data.csv...</span>
</header>

<div style="padding: 15px 20px 0;">
  <h2 id="mainTitle" style="margin:0; font-size:22px;">Ionic Conductivity (σ) vs. Activation Energy (Eₐ)</h2>
  <p style="margin:4px 0 0; font-size:12px; color:#64748b;">Dashed line: Meyer-Neldel Limit. Legend sorted by performance.</p>
</div>

<div class="wrap">
  <div id="chart"></div>

  <aside>
    <div class="card">
      <h3>Structure (Ranked by σ)</h3>
      <div id="structLegend"></div>
    </div>
    <div class="card">
      <h3>Ion Type</h3>
      <div id="ionLegend"></div>
    </div>
  </aside>
</div>

<script>
/* Match the Column Names from your CSV */
const COL_SIGMA  = "Conductivity σ (S/cm)";
const COL_EA     = "Activation Energy Ea (eV)";
const COL_STRUCT = "Structure Group";
const COL_ION    = "Ion Type";
const COL_FORM   = "Superionic Conductor Formula (Chemical)";

const COLORS = { "Argyrodite":"#ab47bc", "Halide":"#26a69a", "NASICON":"#66bb6a", "Anti-perovskite":"#0d47a1", "Spinel":"#8d6e63", "Polymeric":"#ff7043", "Amorphous":"#f6bf26", "Others":"#94a3b8" };
const SHAPES = ["circle", "square", "diamond", "cross", "x", "triangle-up", "star"];

let rawData = [];

/* AUTOMATIC LOADING - Exactly like your Dot Matrix */
d3.csv("data.csv").then(data => {
    // Filter out bad data
    rawData = data.filter(d => +d[COL_SIGMA] > 0 && +d[COL_EA] > 0);
    
    document.getElementById("status").textContent = `Loaded ${rawData.length} entries`;
    
    // 1. TOP NOTCH UPGRADE: Rank Structure Groups by their best performance
    const structs = [...new Set(rawData.map(d => d[COL_STRUCT]))].filter(Boolean);
    structs.sort((a,b) => {
        const maxA = d3.max(rawData.filter(d => d[COL_STRUCT] === a), d => +d[COL_SIGMA]);
        const maxB = d3.max(rawData.filter(d => d[COL_STRUCT] === b), d => +d[COL_SIGMA]);
        return maxB - maxA;
    });

    renderLegend(structs);
    drawChart();
}).catch(err => {
    document.getElementById("chart").innerHTML = `
        <div style="padding:40px; color:#b91c1c; text-align:center;">
            <b>⚠️ data.csv not found or blocked.</b><br>
            Ensure the file is in this folder and you are using a local web server (like VS Code Live Server).
        </div>`;
});

function renderLegend(structs) {
    const sCont = document.getElementById('structLegend');
    structs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'legend-row';
        div.innerHTML = `<div class="swatch" style="background:${COLORS[s] || '#999'}"></div><span>${s}</span>`;
        sCont.appendChild(div);
    });

    const ions = [...new Set(rawData.map(d => d[COL_ION]))].filter(Boolean).sort();
    const iCont = document.getElementById('ionLegend');
    ions.forEach(ion => {
        const div = document.createElement('div');
        div.className = 'legend-row';
        div.innerHTML = `<span style="font-weight:bold; color:#64748b; width:16px; text-align:center;">◈</span><span>${ion}</span>`;
        iCont.appendChild(div);
    });
}

function drawChart() {
    const size = document.getElementById('sizeScale').value;
    const traces = [];
    
    // Grouping for Plotly
    const groups = d3.groups(rawData, d => d[COL_STRUCT]);
    const ionShapes = {};
    [...new Set(rawData.map(d => d[COL_ION]))].forEach((ion, i) => { ionShapes[ion] = SHAPES[i % SHAPES.length]; });

    groups.forEach(([name, data]) => {
        traces.push({
            x: data.map(d => +d[COL_EA]),
            y: data.map(d => +d[COL_SIGMA]),
            text: data.map(d => d[COL_FORM]),
            mode: 'markers',
            name: name,
            marker: { 
                size: size, 
                color: COLORS[name] || '#999', 
                symbol: data.map(d => ionShapes[d[COL_ION]]),
                line: {width: 0.8, color: '#fff'}, 
                opacity: 0.8 
            },
            hovertemplate: "<b>%{text}</b><br>Ea: %{x} eV<br>σ: %{y} S/cm<extra></extra>"
        });
    });

    const layout = {
        xaxis: { title: "Activation Energy E<sub>a</sub> (eV)", range: [0, 1.2], gridcolor: "#f1f5f9" },
        yaxis: { title: "Ionic Conductivity σ (S·cm⁻¹)", type: "log", gridcolor: "#f1f5f9" },
        margin: { t: 20, r: 20, b: 60, l: 80 },
        showlegend: false,
        plot_bgcolor: "#fff",
        // 2. TOP NOTCH UPGRADE: The "Efficiency Frontier"
        shapes: [{ type: 'line', x0: 0.05, y0: 5, x1: 1.1, y1: 1e-10, line: { color: '#cbd5e1', width: 2, dash: 'dash' } }]
    };

    Plotly.newPlot('chart', traces, layout, { responsive: true, displayModeBar: false });
}

/* 3. TOP NOTCH UPGRADE: High-Quality Export */
function downloadPNG() { Plotly.downloadImage('chart', {format:'png', width:1400, height:900, filename:'Ea_vs_Sigma_300DPI'}); }
function downloadSVG() { Plotly.downloadImage('chart', {format:'svg', width:1400, height:900, filename:'Ea_vs_Sigma_Vector'}); }

document.getElementById('sizeScale').oninput = drawChart;
</script>
</body>
</html>
