<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cycle Life vs Retention</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root { color-scheme: light; }
  body { margin: 16px; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial; background:#f7f7f7; color:#0f172a; }
  h2 { margin: 8px 0 12px; font-size: 24px; }
  
  /* Export Button Styles */
  .toolbar { display:flex; gap:10px; align-items:center; margin:10px 0 20px; }
  .btn-export { border:1px solid #d0d0d0; border-radius:6px; padding:8px 14px; font-size:13px; font-weight:bold; cursor:pointer; transition:0.2s; font-family: system-ui, sans-serif; }
  .btn-primary { background: #007aff; color: #fff; border:none; margin-left: auto;}
  .btn-primary:hover { background: #0062cc; }
  .btn-success { background: #10b981; color: #fff; border:none; }
  .btn-success:hover { background: #059669; }
  .btn-success-dark { background: #047857; color: #fff; border: none; }
  .btn-success-dark:hover { background: #065f46; }
  .btn-success-ultra { background: #064e3b; color: #fff; border: none; }
  .btn-success-ultra:hover { background: #022c22; }
  .btn-success-max { background: #022c22; color: #fff; border: none; }
  .btn-success-max:hover { background: #011f18; }
  /* End Export Button Styles */

  .wrap { display: flex; align-items: flex-start; gap: 16px; }
  #chartPane { flex: 1 1 auto; min-width: 0; }
  svg { width: 100%; height: auto; background:#fff; border:1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .axis path, .axis line { stroke:#9ca3af; }
  .axis text { fill:#374151; font-size:12px; }
  .tooltip { position: fixed; pointer-events: none; background:#fff; border:1px solid #e5e7eb; box-shadow:0 8px 16px rgba(0,0,0,.08); border-radius:8px; padding:8px 10px; font-size:12px; color:#111827; z-index: 100; }
  .legends { flex: 0 0 280px; position: sticky; top: 8px; display:flex; flex-direction: column; gap: 12px; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius: 12px; padding: 10px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .card h3 { margin: 0 0 8px; font-size: 13px; color:#111827; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .legend-list { display:flex; flex-direction: column; gap:4px; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; padding:6px 8px; border-radius:8px; cursor:pointer; user-select:none; }
  .legend-item:hover { background:#f3f4f6; }
  .legend-item.inactive { opacity:0.45; }
  .legend-swatch { width:16px; height:16px; border-radius:4px; border:1px solid rgba(0,0,0,0.35); }
  .legend-symbol { width:18px; height:18px; flex:0 0 18px; }
  .reset { border:1px solid #e5e7eb; background:#fff; border-radius:999px; padding:4px 8px; cursor:pointer; font-size:12px; color:#374151; }
  .reset:hover { background:#f3f4f6; }
  @media (max-width: 980px) {
    .wrap { flex-direction: column; }
    .legends { position: static; width: 100%; flex-basis: auto; }
  }
</style>
</head>
<body>

<h2>Cycle Life vs Retention %</h2>

<div class="toolbar">
  <button onclick="exportChart('svg')" class="btn-export btn-primary" title="Preferred for journals (Infinite Resolution Vector)">⬇ SVG</button>
  <button onclick="exportChart('png', 3.125)" class="btn-export btn-success" title="Standard Print Quality (~300 DPI)">⬇ 300 DPI</button>
  <button onclick="exportChart('png', 6.25)" class="btn-export btn-success-dark" title="Professional journal quality (~600 DPI)">⬇ 600 DPI</button>
  <button onclick="exportChart('png', 8.33)" class="btn-export btn-success-ultra" title="Maximum safe resolution (~800 DPI)">⬇ 800 DPI</button>
  <button onclick="exportChart('png', 12.5)" class="btn-export btn-success-max" title="Extreme resolution (~1200 DPI)">⬇ 1200 DPI</button>
</div>

<div class="wrap">
  <div id="chartPane">
    <svg id="chart" viewBox="0 0 1000 640" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <aside class="legends">
    <div class="card" id="card-structure">
      <h3>Structure Type (Color) <button class="reset" id="resetStructure">Reset</button></h3>
      <div id="colorItems" class="legend-list"></div>
    </div>
    <div class="card" id="card-ion">
      <h3>Ion Type (Shape) <button class="reset" id="resetIon">Reset</button></h3>
      <div id="shapeItems" class="legend-list"></div>
    </div>
  </aside>
</div>

<script>
const CSV_FILE = "data.csv";

const margin = {top: 24, right: 20, bottom: 60, left: 70};
const innerW = 1000 - margin.left - margin.right;
const innerH = 640 - margin.top - margin.bottom;

const svg = d3.select("#chart");
const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
const xAxisG = g.append("g").attr("class", "axis").attr("transform", `translate(0,${innerH})`);
const yAxisG = g.append("g").attr("class", "axis");

g.append("text").attr("x", innerW/2).attr("y", innerH + 46).attr("text-anchor","middle").attr("fill", "#111827").attr("font-size", 13).text("Cycle Life");
g.append("text").attr("transform","rotate(-90)").attr("x", -innerH/2).attr("y", -50).attr("text-anchor","middle").attr("fill", "#111827").attr("font-size", 13).text("Retention (%)");

const tooltip = d3.select("body").append("div").attr("class", "tooltip").style("opacity", 0);
const fmtInt = d3.format(",");

function parseCycleLife(s) {
  if (s == null) return NaN;
  let str = String(s).trim().toLowerCase().replace(/,/g, "");
  if (!str) return NaN;
  const range = str.split(/[-–—to]+/i).map(x => x.trim());
  if (range.length > 1) return d3.max(range.map(parseCycleLife));
  if (/^[~>]*\s*\d*\.?\d+\s*e[-+]?\d+/.test(str)) {
    const m = str.match(/(\d*\.?\d+)\s*e\s*([-+]?\d+)/);
    if (m) return Number(m[1]) * Math.pow(10, Number(m[2]));
  }
  if (/10\^[-+]?\d+/.test(str)) {
    const m = str.match(/10\^([-+]?\d+)/);
    if (m) return Math.pow(10, Number(m[1]));
  }
  if (/^\s*[~>]*\s*\d*\.?\d+\s*[km]\b/.test(str)) {
    const m = str.match(/(\d*\.?\d+)\s*([km])/);
    if (m) { const v = Number(m[1]); return m[2] === "k" ? v * 1e3 : v * 1e6; }
  }
  const plain = str.match(/-?\d*\.?\d+/);
  if (plain) return Number(plain[0]);
  return NaN;
}
function pick(cols, cands){ for(const c of cands) if(cols.includes(c)) return c; return null; }

/* ---------- Your Ion → Shape palette ---------- */
const ION_SHAPES = {
  "Li+":  "circle",
  "Na+":  "square",
  "K+":   "diamond",
  "Ag+":  "cross",
  "O2-":  "triangle-up",
  "Zn2+": "triangle-down",
  "H+":   "x",
  "Rb+":  "star",
  "F-":   "hexagon",
  "Cu+":  "triangle-left",
  "Mg2+": "triangle-right",
  "In3+": "bowtie",
  "I-":   "hourglass",
  "Sn4+": "pentagon"
};

/* ---- Shape path generator (supports custom names) ----
   Returns { d: 'M...', rotate: angleDeg, strokeOnly: boolean }
   size is in px^2 like d3.symbol().size()
------------------------------------------------------- */
function symbolPath(type, size = 110){
  const builtin = n => d3.symbol().type(n).size(size)();
  const rotSpec = (base, angle) => ({ d: builtin(base), rotate: angle, strokeOnly: false });
  const area = size, tau = Math.PI * 2;

  function regularPolygon(n){
    // approximate radius such that area ~ size
    const r = Math.sqrt((2*area)/(n*Math.sin(2*Math.PI/n)));
    const pts = [];
    for(let i=0;i<n;i++){
      const ang = (tau/n)*i - Math.PI/2; // start at top
      pts.push([ r*Math.cos(ang), r*Math.sin(ang) ]);
    }
    return "M" + pts.map(p=>p.join(",")).join("L") + "Z";
  }

  switch(type){
    case "circle":   return { d: builtin(d3.symbolCircle),  rotate:0, strokeOnly:false };
    case "square":   return { d: builtin(d3.symbolSquare),  rotate:0, strokeOnly:false };
    case "diamond":  return { d: builtin(d3.symbolDiamond), rotate:0, strokeOnly:false };
    case "triangle": // alias
    case "triangle-up":    return { d: builtin(d3.symbolTriangle), rotate:0,   strokeOnly:false };
    case "triangle-down":  return rotSpec(d3.symbolTriangle, 180);
    case "triangle-left":  return rotSpec(d3.symbolTriangle, -90);
    case "triangle-right": return rotSpec(d3.symbolTriangle, 90);
    case "cross":    return { d: builtin(d3.symbolCross),   rotate:0, strokeOnly:false };
    case "star":     return { d: builtin(d3.symbolStar),    rotate:0, strokeOnly:false };
    case "wye":      return { d: builtin(d3.symbolWye),     rotate:0, strokeOnly:false };
    case "hexagon":  return { d: regularPolygon(6), rotate:0, strokeOnly:false };
    case "pentagon": return { d: regularPolygon(5), rotate:0, strokeOnly:false };
    case "bowtie": {
      const r = Math.sqrt(size/Math.PI);
      const p1 = `M0,0 L${r},${-r} L${r},${r} Z`;
      const p2 = `M0,0 L${-r},${-r} L${-r},${r} Z`;
      return { d: p1 + " " + p2, rotate:0, strokeOnly:false };
    }
    case "hourglass": {
      const r = Math.sqrt(size/Math.PI);
      const p1 = `M${-r},${-r} L${r},${-r} L0,0 Z`;
      const p2 = `M${-r},${r} L${r},${r} L0,0 Z`;
      return { d: p1 + " " + p2, rotate:0, strokeOnly:false };
    }
    case "x": {
      const r = Math.sqrt(size/Math.PI), t = Math.max(1.2, r*0.20);
      const p = `M${-r},${-t} L${r},${t} M${-r},${t} L${r},${-t}`;
      return { d: p, rotate:0, strokeOnly:true };
    }
    default:         return { d: builtin(d3.symbolCircle),  rotate:0, strokeOnly:false };
  }
}
function ionSpec(ion, size=110){
  const key = (ion||"").trim();
  return symbolPath(ION_SHAPES[key] || "circle", size);
}

// Global states exposed for the export script
let globalStructureTypes = [];
let globalIonTypes = [];
let globalActiveStructures = new Set();
let globalActiveIons = new Set();
let globalColorScale = null;

/* ---------- Data & draw ---------- */
d3.csv(CSV_FILE).then(raw => {
  const cols = Object.keys(raw[0] || {});
  const C_FORMULA = pick(cols, ["Formula (Chemical)", "Formula"]);
  const C_STRUCT  = pick(cols, ["Structure Group"]);
  const C_ION     = pick(cols, ["Ion Type","IonType","Ion_Type"]);
  const C_CYCLE   = pick(cols, ["Cycle Life normalized (cycles)","Cycle Life"]);
  const C_RET     = pick(cols, ["Retention % normalized"]);

  const data = raw.map(d => {
    const cycle = parseCycleLife(d[C_CYCLE]);
    const ret   = Number(String(d[C_RET]).replace(/%/g,""));
    return {
      Formula: (d[C_FORMULA] || "").trim(),
      StructureType: (d[C_STRUCT] || "").trim(),
      IonType: (d[C_ION] || "").trim(),
      CycleLife: cycle,
      Retention: Math.max(0, Math.min(100, isFinite(ret) ? ret : NaN))
    };
  }).filter(d => Number.isFinite(d.CycleLife) && d.CycleLife >= 0 && Number.isFinite(d.Retention));

  if (!data.length) {
    g.append("text").attr("x", innerW/2).attr("y", innerH/2).attr("text-anchor","middle").attr("fill","#6b7280").text("No data to plot after filtering.");
    return;
  }

  const structureTypes = [...new Set(data.map(d => d.StructureType).filter(Boolean))];
  const ionTypes = [...new Set(data.map(d => d.IonType).filter(Boolean))];
  
  globalStructureTypes = structureTypes;
  globalIonTypes = ionTypes;

  const structureColors = {
    "Others": "#9e9e9e",
    "Polymeric": "#ff7043",
    "Argyrodite": "#ab47bc",
    "Halide": "#26a69a",
    "Amorphous": "#f6bf26",
    "NASICON": "#66bb6a",
    "Anti-perovskite": "#0d47a1",
    "Spinel": "#8d6e63"
  };
  const color = d3.scaleOrdinal()
    .domain(structureTypes)
    .range(structureTypes.map(s => structureColors[s] || "#9e9e9e"));
    
  globalColorScale = color;

  const x = d3.scaleLinear().domain([0,2000]).range([0,innerW]);
  const y = d3.scaleLinear().domain([0,100]).range([innerH,0]);
  const xTicks = [0,100,200,500,1000,2000];
  xAxisG.call(d3.axisBottom(x).tickValues(xTicks).tickFormat(d => d>=1000 ? (d/1000)+"k" : d));
  yAxisG.call(d3.axisLeft(y).ticks(10).tickFormat(d => d+"%"));

  // render points with custom shapes
  const sizePx2 = 110; // symbol "area"
  const points = g.selectAll(".pt").data(data).join("path")
    .attr("class","pt")
    .attr("transform", d => {
      const spec = ionSpec(d.IonType, sizePx2);
      const tx = x(Math.max(0, Math.min(2000, d.CycleLife)));
      const ty = y(d.Retention);
      return `translate(${tx},${ty}) rotate(${spec.rotate})`;
    })
    .attr("d", d => ionSpec(d.IonType, sizePx2).d)
    .attr("fill", d => {
      const spec = ionSpec(d.IonType, sizePx2);
      return spec.strokeOnly ? "none" : color(d.StructureType);
    })
    .attr("stroke", d => {
      const spec = ionSpec(d.IonType, sizePx2);
      return spec.strokeOnly ? color(d.StructureType) : "#111827";
    })
    .attr("stroke-width", d => ionSpec(d.IonType, sizePx2).strokeOnly ? 1.4 : 0.7)
    .attr("opacity",0.95)
    .on("mouseover",(event,d)=>{
      tooltip.style("opacity",1).html(`
        <div><b>${d.Formula || "(unknown)"}</b></div>
        <div>Structure: ${d.StructureType || "—"}</div>
        <div>Ion: ${d.IonType || "—"}</div>
        <div>Cycle Life: ${fmtInt(Math.round(d.CycleLife))}</div>
        <div>Retention: ${d.Retention}%</div>`);
    })
    .on("mousemove",(event)=>{tooltip.style("left",(event.clientX+14)+"px").style("top",(event.clientY+14)+"px");})
    .on("mouseout",()=>tooltip.style("opacity",0));

  // filters
  let activeStructures = new Set(structureTypes);
  let activeIons = new Set(ionTypes);
  
  globalActiveStructures = activeStructures;
  globalActiveIons = activeIons;

  function refreshLegendStates(){
    d3.selectAll("#colorItems .legend-item").classed("inactive", function(){
      const txt = d3.select(this).select("span").text();
      return !activeStructures.has(txt);
    });
    d3.selectAll("#shapeItems .legend-item").classed("inactive", function(){
      const txt = d3.select(this).select("span").text();
      return !activeIons.has(txt);
    });
  }
  function updateVisibility(){
    points.transition().duration(250)
      .style("opacity", d => (activeStructures.has(d.StructureType) && activeIons.has(d.IonType)) ? 0.95 : 0.08)
      .style("display", d => (activeStructures.has(d.StructureType) && activeIons.has(d.IonType)) ? null : "none");
  }

  // Structure legend
  const colorItems = d3.select("#colorItems");
  structureTypes.forEach(s => {
    const item = colorItems.append("div").attr("class","legend-item");
    item.on("click", (event) => {
      const soloActive = activeStructures.size === 1 && activeStructures.has(s);
      if (event.metaKey || event.ctrlKey) {
        if (activeStructures.has(s)) activeStructures.delete(s); else activeStructures.add(s);
      } else if (event.shiftKey) {
        activeStructures.add(s);
      } else {
        activeStructures = soloActive ? new Set(structureTypes) : new Set([s]);
      }
      globalActiveStructures = activeStructures;
      refreshLegendStates();
      updateVisibility();
    });
    item.append("div").attr("class","legend-swatch").style("background", color(s));
    item.append("span").text(s || "—");
  });

  // Ion legend (gray shapes)
  const shapeItems = d3.select("#shapeItems");
  ionTypes.forEach(t => {
    const item = shapeItems.append("div").attr("class","legend-item");
    item.on("click", (event) => {
      const soloActive = activeIons.size === 1 && activeIons.has(t);
      if (event.metaKey || event.ctrlKey) {
        if (activeIons.has(t)) activeIons.delete(t); else activeIons.add(t);
      } else if (event.shiftKey) {
        activeIons.add(t);
      } else {
        activeIons = soloActive ? new Set(ionTypes) : new Set([t]);
      }
      globalActiveIons = activeIons;
      refreshLegendStates();
      updateVisibility();
    });
    const sym = ionSpec(t, 140);
    const symSvg = item.append("svg").attr("class","legend-symbol").attr("viewBox","-10 -10 20 20");
    symSvg.append("path")
      .attr("d", sym.d)
      .attr("transform", `rotate(${sym.rotate})`)
      .attr("fill", sym.strokeOnly ? "none" : "#6b7280")
      .attr("stroke", sym.strokeOnly ? "#6b7280" : "#111827")
      .attr("stroke-width", sym.strokeOnly ? 1.4 : 0.7);
    item.append("span").text(t || "—");
  });

  document.getElementById("resetStructure").addEventListener("click",()=>{
    activeStructures = new Set(structureTypes); globalActiveStructures = activeStructures;
    refreshLegendStates(); updateVisibility();
  });
  document.getElementById("resetIon").addEventListener("click",()=>{
    activeIons = new Set(ionTypes); globalActiveIons = activeIons;
    refreshLegendStates(); updateVisibility();
  });

  refreshLegendStates();
  updateVisibility();
});

// ============================================================================
// NATIVE D3 EXPORT PIPELINE - LEGENDS AT BOTTOM
// ============================================================================
function getSVGString(svgNode) {
    svgNode.setAttribute('xlink', 'http://www.w3.org/1999/xlink');
    let cssStyleText = "";
    for (let i = 0; i < document.styleSheets.length; i++) {
        try {
            for (let j = 0; j < document.styleSheets[i].cssRules.length; j++) {
                cssStyleText += document.styleSheets[i].cssRules[j].cssText;
            }
        } catch (e) {}
    }
    const styleElement = document.createElement("style");
    styleElement.setAttribute("type", "text/css");
    styleElement.innerHTML = cssStyleText;
    const refNode = svgNode.hasChildNodes() ? svgNode.children[0] : null;
    svgNode.insertBefore(styleElement, refNode);
    
    const serializer = new XMLSerializer();
    let svgString = serializer.serializeToString(svgNode);
    svgString = svgString.replace(/(\w+)?:?xlink=/g, 'xmlns:xlink=').replace(/NS\d+:href/g, 'xlink:href');
    
    svgNode.removeChild(styleElement);
    return svgString;
}

async function exportChart(format, scale = 4) {
    const svgEl = document.getElementById("chart");
    const d3Svg = d3.select(svgEl);

    // 1. Keep original width, expand height to make room at the bottom
    const origWidth = 1000;
    const origHeight = 640;
    
    // Add space at the bottom for both legends
    const legendHeight = 180; 
    const exportWidth = origWidth;
    const exportHeight = origHeight + legendHeight;

    d3Svg.attr("viewBox", `0 0 ${exportWidth} ${exportHeight}`);

    // 2. Inject a white background
    d3Svg.insert("rect", ":first-child")
        .attr("id", "export-bg")
        .attr("x", 0).attr("y", 0)
        .attr("width", exportWidth).attr("height", exportHeight)
        .attr("fill", "#ffffff");

    // 3. Dynamically draw the SVG Legends at the BOTTOM
    const exportGroup = d3Svg.append("g").attr("id", "export-elements");
    
    const startX = 70; // Align with the left margin of the chart
    let curX = startX;
    let curY = origHeight + 30; // Start below the chart

    // --- DRAW STRUCTURE LEGEND ---
    exportGroup.append("text").attr("x", curX).attr("y", curY).text("Structure Type")
        .attr("font-weight", "bold").attr("font-size", "14px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
    curY += 24;

    const columnWidthStruct = 180; 
    globalStructureTypes.forEach(struct => {
        if(globalActiveStructures.has(struct)) {
            if (curX > (exportWidth / 2) - columnWidthStruct) {
                curX = startX; 
                curY += 24;
            }
            
            exportGroup.append("rect").attr("x", curX).attr("y", curY - 12)
                .attr("width", 14).attr("height", 14).attr("rx", 3)
                .attr("fill", globalColorScale(struct)).attr("stroke", "rgba(0,0,0,0.4)");
                
            exportGroup.append("text").attr("x", curX + 22).attr("y", curY)
                .text(struct)
                .attr("font-size", "13px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
            
            curX += columnWidthStruct;
        }
    });

    // --- DRAW ION LEGEND (On the Right Side of the Bottom Area) ---
    const startXRight = (exportWidth / 2) + 40;
    curX = startXRight;
    curY = origHeight + 30; // Reset Y to the top of the legend area

    exportGroup.append("text").attr("x", curX).attr("y", curY).text("Ion Type")
        .attr("font-weight", "bold").attr("font-size", "14px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
    curY += 24;

    const columnWidthIon = 120;
    globalIonTypes.forEach(ion => {
        if(globalActiveIons.has(ion)) {
            if (curX > exportWidth - columnWidthIon) {
                curX = startXRight; 
                curY += 24;
            }
            
            const sym = ionSpec(ion, 110);
            exportGroup.append("path")
                .attr("d", sym.d)
                .attr("transform", `translate(${curX + 7}, ${curY - 4}) rotate(${sym.rotate})`)
                .attr("fill", sym.strokeOnly ? "none" : "#6b7280")
                .attr("stroke", sym.strokeOnly ? "#6b7280" : "#111827")
                .attr("stroke-width", sym.strokeOnly ? 1.4 : 0.7);
                
            exportGroup.append("text").attr("x", curX + 22).attr("y", curY)
                .text(ion)
                .attr("font-size", "13px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
            
            curX += columnWidthIon;
        }
    });

    const svgString = getSVGString(svgEl);

    if (format === 'svg') {
        const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = "Scatter_Plot_Publication.svg";
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    } else {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d"); 
        
        canvas.width = exportWidth * scale; 
        canvas.height = exportHeight * scale;
        
        const img = new Image();
        const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(svgBlob);

        await new Promise(resolve => { 
            img.onload = () => { 
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height); 
                URL.revokeObjectURL(url); 
                const link = document.createElement("a"); 
                link.download = `Scatter_Plot_${Math.round(scale * 96)}DPI.png`; 
                link.href = canvas.toDataURL("image/png"); 
                document.body.appendChild(link); link.click(); document.body.removeChild(link); 
                resolve(); 
            }; 
            img.src = url; 
        });
    }

    // Cleanup: Remove background, legends, and restore normal viewport
    d3Svg.select("#export-elements").remove();
    d3Svg.select("#export-bg").remove();
    d3Svg.attr("viewBox", `0 0 ${origWidth} ${origHeight}`);
}
</script>
</body>
