<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Conductivity by Structure Group</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root { --side: 260px; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#fafafa; color:#111; margin:24px; }
  h2 { margin:0 0 10px; }
  
  /* Export Button Styles added here */
  .toolbar { display:flex; gap:10px; align-items:center; margin:10px 0 14px; }
  .btn { border:1px solid #d0d0d0; border-radius:6px; padding:8px 14px; font-size:13px; font-weight:bold; cursor:pointer; transition:0.2s; font-family: system-ui, sans-serif; }
  .btn-primary { background: #007aff; color: #fff; border:none; margin-left: auto;}
  .btn-primary:hover { background: #0062cc; }
  .btn-success { background: #10b981; color: #fff; border:none; }
  .btn-success:hover { background: #059669; }
  .btn-success-dark { background: #047857; color: #fff; border: none; }
  .btn-success-dark:hover { background: #065f46; }
  .btn-success-ultra { background: #064e3b; color: #fff; border: none; }
  .btn-success-ultra:hover { background: #022c22; }
  .btn-success-max { background: #022c22; color: #fff; border: none; }
  .btn-success-max:hover { background: #011f18; }
  /* End Export Button Styles */

  .wrap { display:grid; grid-template-columns: 1fr var(--side); gap:16px; align-items:start; }
  svg { width: 980px; height: 640px; background:#fff; border:1px solid #e5e5e5; border-radius:10px; }
  .axis-label { font-size:14px; font-weight:600; fill:#222; }
  .grid line { stroke:#eee; }
  .violin { fill-opacity:.7; stroke:#222; stroke-width:.9px; }
  .median { stroke:#e43; stroke-width:2px; }
  .label-halo { fill:none; stroke:#fff; stroke-width:4px; paint-order:stroke; }
  .median-text { fill:#111; font-size:11px; font-weight:700; text-anchor:middle; }
  .point { opacity:.8; stroke:#333; stroke-width:.4px; }
  .side { position:sticky; top:16px; background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:12px; }
  .legend-title { font-weight:700; font-size:14px; margin:6px 0; }
  .legend-controls { display:flex; gap:6px; margin: 4px 0 8px; }
  .legend-controls button { font-size:12px; padding:2px 6px; border:1px solid #ccc; background:#fff; cursor:pointer; border-radius:4px; }
  .legend-item { display:flex; align-items:center; gap:8px; margin:6px 0; cursor:pointer; user-select:none; }
  .legend-item.disabled { opacity:.35; text-decoration:line-through; }
  .legend-swatch { width:14px; height:14px; border-radius:3px; border:1px solid #444; }
</style>
</head>
<body>

<h2>Conductivity by Structure Group</h2>

<div class="toolbar">
  <button onclick="exportChart('svg')" class="btn btn-primary" title="Preferred for journals (Infinite Resolution Vector)">⬇ SVG</button>
  <button onclick="exportChart('png', 3.125)" class="btn btn-success" title="Standard Print Quality (~300 DPI)">⬇ 300 DPI</button>
  <button onclick="exportChart('png', 6.25)" class="btn btn-success-dark" title="Professional journal quality (~600 DPI)">⬇ 600 DPI</button>
  <button onclick="exportChart('png', 8.33)" class="btn btn-success-ultra" title="Maximum safe resolution (~800 DPI)">⬇ 800 DPI</button>
  <button onclick="exportChart('png', 12.5)" class="btn btn-success-max" title="Extreme resolution (~1200 DPI)">⬇ 1200 DPI</button>
</div>

<div class="wrap">
  <svg></svg>

  <div class="side">
    <div class="legend-title">Ion Type (filter points)</div>
    <div class="legend-controls">
      <button id="showAll">Show all</button>
      <button id="hideAll">Hide all</button>
    </div>
    <div id="legend"></div>
  </div>
</div>

<script>
const COL = {
  struct: "Structure Group",
  ion:    "Ion Type",
  sigma:  "Conductivity σ (S·cm⁻¹) / Temp (°C) normalized"
};

// Structure colors
const structureColors = {
  "Others": "#9e9e9e",
  "Polymeric": "#ff7043",
  "Argyrodite": "#ab47bc",
  "Halide": "#26a69a",
  "Amorphous": "#f6bf26",
  "NASICON": "#66bb6a",
  "Anti-perovskite": "#0d47a1",
  "Spinel": "#8d6e63"
};

// Ion colors
const ionColors = {
  "Li+":  "#ff5252",  
  "Na+":  "#81d4fa",  
  "K+":   "#004d40",  
  "Ag+":  "#f48fb1",  
  "O2-":  "#6d4c41",  
  "Zn2+": "#c2185b"
};

const svg = d3.select("svg");
const width = 980, height = 640;
const margin = {top: 40, right: 30, bottom: 80, left: 90};
const innerW = width - margin.left - margin.right;
const innerH = height - margin.top - margin.bottom;
const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

function xmur3(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=(h<<13)|(h>>>19);}return function(){h=Math.imul(h^(h>>>16),2246822507);h=Math.imul(h^(h>>>13),3266489909);return (h^=h>>>16)>>>0;};}
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return ((t^(t>>>14))>>>0)/4294967295;} ;}
function stableJitter(key,half){const seed=xmur3(key)();const rand=mulberry32(seed);return (rand()*2-1)*half;}

const kde = (kernel, X) => V => X.map(x => [x, d3.mean(V, v => kernel(x - v))]);
const epan = k => v => {v/=k; return Math.abs(v)<=1 ? 0.75*(1 - v*v)/k : 0;};
const fmt = d3.format(".4f");

let globalIons = []; // Export variable

d3.csv("data.csv").then(raw => {
  const rows = raw.map(d => {
    const s = +d[COL.sigma];
    return {
      structure: (d[COL.struct] || "Others").trim() || "Others",
      ion: (d[COL.ion] || "Unknown").trim() || "Unknown",
      sigma: s,
      logSig: Number.isFinite(s) && s > 0 ? Math.log10(s) : null
    };
  }).filter(d => d.logSig !== null);

  const structures = Array.from(new Set(rows.map(d => d.structure)));
  const ions = Array.from(new Set(rows.map(d => d.ion)));
  
  globalIons = ions; // Pass to export function

  const x = d3.scaleBand().domain(structures).range([0, innerW]).padding(0.12);
  const y = d3.scaleLinear().domain(d3.extent(rows, d => d.logSig)).nice().range([innerH, 0]);

  g.append("g").attr("transform", `translate(0,${innerH})`)
    .call(d3.axisBottom(x))
    .selectAll("text").attr("transform","rotate(-28)").style("text-anchor","end");
  g.append("g").call(d3.axisLeft(y).ticks(8).tickFormat(v => `10^${v}`));
  g.append("g").attr("class","grid").call(d3.axisLeft(y).ticks(8).tickSize(-innerW).tickFormat(""));

  g.append("text").attr("class","axis-label").attr("x", innerW/2).attr("y", innerH+62).attr("text-anchor","middle").text("Structure Group");
  g.append("text").attr("class","axis-label").attr("x", -innerH/2).attr("y", -64).attr("transform","rotate(-90)").attr("text-anchor","middle").text("log10(σ) (S/cm)");

  const ticks = d3.ticks(...y.domain(), 80);
  const estimator = kde(epan(0.25), ticks);
  const grouped = d3.group(rows, d => d.structure);

  const violins = structures.map(sg => {
    const vals = (grouped.get(sg) || []).map(d => d.logSig);
    if (!vals.length) return {structure: sg, density: [], median: null, n: 0};
    const dens = estimator(vals);
    const median = d3.quantileSorted(vals.slice().sort(d3.ascending), 0.5);
    return {structure: sg, density: dens, median, n: vals.length};
  });

  const globalMax = d3.max(violins.flatMap(v => v.density.map(d => d[1]))) || 1;
  const maxN = d3.max(violins, v => v.n) || 1;
  const widthFactor = d3.scaleSqrt().domain([1, maxN]).range([0.55, 1.0]);

  g.append("g")
    .selectAll(".violin")
    .data(violins)
    .join("path")
    .attr("class","violin")
    .attr("fill", v => structureColors[v.structure] || "#ccc")
    .attr("d", v => {
      const bw = x.bandwidth() * widthFactor(v.n);
      const xCenter = x(v.structure) + x.bandwidth()/2;
      const xSpan = d3.scaleLinear().domain([-globalMax, globalMax]).range([xCenter - bw/2, xCenter + bw/2]);
      const area = d3.area().x0(d => xSpan(-d[1])).x1(d => xSpan(d[1])).y(d => y(d[0])).curve(d3.curveCatmullRom);
      return area(v.density);
    });

  g.append("g")
    .selectAll(".median")
    .data(violins.filter(v => v.median !== null))
    .join("g")
    .each(function(v){
      const xCenter = x(v.structure) + x.bandwidth()/2;
      const bw = x.bandwidth() * widthFactor(v.n);
      d3.select(this).append("line")
        .attr("class","median")
        .attr("x1", xCenter - bw*0.25)
        .attr("x2", xCenter + bw*0.25)
        .attr("y1", y(v.median))
        .attr("y2", y(v.median));
      d3.select(this).append("text")
        .attr("class","label-halo")
        .attr("x", xCenter).attr("y", y(v.median) - 6).text(fmt(Math.pow(10, v.median)));
      d3.select(this).append("text")
        .attr("class","median-text")
        .attr("x", xCenter).attr("y", y(v.median) - 6).text(fmt(Math.pow(10, v.median)));
    });

  const structCenter = Object.fromEntries(structures.map(sg => [sg, x(sg) + x.bandwidth()/2]));
  const structHalf = Object.fromEntries(violins.map(v => [v.structure, (x.bandwidth() * widthFactor(v.n))/2 * 0.92]));
  let activeIons = new Set(ions);

  const pts = g.append("g")
    .selectAll(".point")
    .data(rows)
    .join("circle")
      .attr("class","point")
      .attr("r",3)
      .attr("cx",d=>{
        const c=structCenter[d.structure],h=structHalf[d.structure]||x.bandwidth()/2;
        const key=`${d.structure}|${d.ion}|${d.sigma}|${d.logSig}`;
        return c+stableJitter(key,h);
      })
      .attr("cy",d=>y(d.logSig))
      .attr("fill",d=>ionColors[d.ion]||"#6b7280")
      .attr("display",d=>activeIons.has(d.ion)?null:"none");

  const legend=d3.select("#legend");
  const items=legend.selectAll(".legend-item").data(ions).enter().append("div").attr("class","legend-item");
  items.append("div").attr("class","legend-swatch").style("background",d=>ionColors[d]||"#6b7280");
  items.append("span").text(d=>d);

  function updatePoints(){ pts.attr("display",d=>activeIons.has(d.ion)?null:"none"); }
  items.on("click",function(_,ion){
    if(activeIons.has(ion)) activeIons.delete(ion); else activeIons.add(ion);
    d3.select(this).classed("disabled",!activeIons.has(ion));
    updatePoints();
  });
  d3.select("#showAll").on("click",()=>{activeIons=new Set(ions);items.classed("disabled",false);updatePoints();});
  d3.select("#hideAll").on("click",()=>{activeIons.clear();items.classed("disabled",true);updatePoints();});
});

// ============================================================================
// NATIVE D3 EXPORT PIPELINE
// ============================================================================
function getSVGString(svgNode) {
    svgNode.setAttribute('xlink', 'http://www.w3.org/1999/xlink');
    let cssStyleText = "";
    for (let i = 0; i < document.styleSheets.length; i++) {
        try {
            for (let j = 0; j < document.styleSheets[i].cssRules.length; j++) {
                cssStyleText += document.styleSheets[i].cssRules[j].cssText;
            }
        } catch (e) {}
    }
    const styleElement = document.createElement("style");
    styleElement.setAttribute("type", "text/css");
    styleElement.innerHTML = cssStyleText;
    const refNode = svgNode.hasChildNodes() ? svgNode.children[0] : null;
    svgNode.insertBefore(styleElement, refNode);
    
    const serializer = new XMLSerializer();
    let svgString = serializer.serializeToString(svgNode);
    svgString = svgString.replace(/(\w+)?:?xlink=/g, 'xmlns:xlink=').replace(/NS\d+:href/g, 'xlink:href');
    
    svgNode.removeChild(styleElement);
    return svgString;
}

async function exportChart(format, scale = 4) {
    const svgEl = document.querySelector("svg");
    const d3Svg = d3.select(svgEl);

    // 1. Expand the viewBox to make room for the legend on the right
    const origWidth = 980;
    const origHeight = 640;
    const legendWidth = 200;
    const exportWidth = origWidth + legendWidth;

    d3Svg.attr("viewBox", `0 0 ${exportWidth} ${origHeight}`);
    d3Svg.attr("width", exportWidth); // temporarily widen canvas

    // 2. Inject a white background
    d3Svg.insert("rect", ":first-child")
        .attr("id", "export-bg")
        .attr("x", 0).attr("y", 0)
        .attr("width", exportWidth).attr("height", origHeight)
        .attr("fill", "#ffffff");

    // 3. Dynamically draw the SVG Legend so it appears in the downloaded image
    const exportGroup = d3Svg.append("g").attr("id", "export-elements");
    
    const legX = origWidth + 10; 
    let curY = 60; 

    exportGroup.append("text").attr("x", legX).attr("y", curY).text("Ion Type")
        .attr("font-weight", "bold").attr("font-size", "14px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
    curY += 24;

    globalIons.forEach(ion => {
        exportGroup.append("rect").attr("x", legX).attr("y", curY - 12)
            .attr("width", 14).attr("height", 14).attr("rx", 3)
            .attr("fill", ionColors[ion] || "#6b7280").attr("stroke", "rgba(0,0,0,0.4)");
            
        exportGroup.append("text").attr("x", legX + 24).attr("y", curY)
            .text(ion)
            .attr("font-size", "13px").attr("font-family", "system-ui, sans-serif").attr("fill", "#111");
        curY += 24;
    });

    const svgString = getSVGString(svgEl);

    if (format === 'svg') {
        const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = "Violin_Chart_Publication.svg";
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    } else {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d"); 
        
        canvas.width = exportWidth * scale; 
        canvas.height = origHeight * scale;
        
        const img = new Image();
        const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(svgBlob);

        await new Promise(resolve => { 
            img.onload = () => { 
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height); 
                URL.revokeObjectURL(url); 
                const link = document.createElement("a"); 
                link.download = `Violin_Chart_${Math.round(scale * 96)}DPI.png`; 
                link.href = canvas.toDataURL("image/png"); 
                document.body.appendChild(link); link.click(); document.body.removeChild(link); 
                resolve(); 
            }; 
            img.src = url; 
        });
    }

    // Cleanup: Remove background, legends, and restore normal viewport
    d3Svg.select("#export-elements").remove();
    d3Svg.select("#export-bg").remove();
    d3Svg.attr("viewBox", null);
    d3Svg.attr("width", origWidth); // Restore width to original
}
</script>
</body>
</html>
